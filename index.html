  { id:"fo5", area:"fordon", fraga:"Hur bör du bromsa i en nödsituation med ABS-bromsar?", alt:["Pumpa snabbt på bromsen","Trampa hårt och håll kvar trycket","Bromsa försiktigt","Dra bara i handbromsen"], ratt:1, forklaring:"Med ABS trampar du hårt och håller kvar – systemet sköter pumpandet automatiskt så att du kan styra." },
  { id:"fo6", area:"fordon", fraga:"Vad händer om däcken har för lågt lufttryck?", alt:["Bränsleförbrukningen minskar","Förbrukning och slitage ökar och väggreppet försämras","Inget alls","Bilen går fortare"], ratt:1, forklaring:"För lågt däcktryck ökar både bränsleförbrukning och däckslitage och försämrar väghållningen." },
  { id:"fo7", area:"fordon", fraga:"En röd varningslampa tänds på instrumentpanelen. Vad bör du göra?", alt:["Köra vidare som vanligt","Stanna och åtgärda felet – det är allvarligt","Vänta tills den slocknar","Täcka över lampan"], ratt:1, forklaring:"En röd varningslampa signalerar ett allvarligt fel. Stanna så snart du kan och åtgärda problemet." },
  { id:"fo8", area:"fordon", fraga:"Vad betyder en gul/orange varningslampa oftast?", alt:["Att du måste stanna omedelbart","Att något bör kontrolleras, men det är mindre akut","Att allt är som det ska","Att bränslet är slut"], ratt:1, forklaring:"Gul/orange lampa betyder att något bör kontrolleras snart, men är normalt mindre allvarligt än en röd lampa." },
  { id:"fo9", area:"fordon", fraga:"När får du använda helljus?", alt:["Alltid i mörker","I mörker när du inte riskerar att blända andra trafikanter","Aldrig","Endast i tunnlar"], ratt:1, forklaring:"Helljus får användas i mörker, men du måste växla till halvljus så att du inte bländar mötande eller framförvarande." },
  { id:"fo10", area:"fordon", fraga:"Du möter en bil i mörker. Vad gör du med helljuset?", alt:["Behåller helljuset","Växlar till halvljus i god tid","Släcker alla lyktor","Blinkar med helljuset"], ratt:1, forklaring:"Du ska växla till halvljus i god tid så att du inte bländar den mötande föraren." },
  { id:"fo11", area:"fordon", fraga:"Vilka i bilen måste använda bilbälte?", alt:["Bara föraren","Bara de i framsätet","Alla som åker i bilen","Endast barn"], ratt:2, forklaring:"Alla som åker i bilen ska använda bilbälte – även passagerare i baksätet. Bältet är ett av de viktigaste skydden." },
  { id:"fo12", area:"fordon", fraga:"Hur bör små barn placeras i bilen?", alt:["I framsätet utan stol","I bakåtvänd bilbarnstol så länge som möjligt","I knät på en vuxen","Stående i baksätet"], ratt:1, forklaring:"Barn bör åka bakåtvända så länge som möjligt (minst till 3–4 års ålder), eftersom det skyddar nacke och huvud bäst." },
  { id:"fo13", area:"fordon", fraga:"Du transporterar last som skjuter ut mer än 1 meter bakom bilen. Vad gäller?", alt:["Inget särskilt","Lasten ska märkas ut tydligt","Det är alltid förbjudet","Du måste köra på motorväg"], ratt:1, forklaring:"Last som skjuter ut mer än 1 meter bakom fordonet ska märkas ut, t.ex. med en flagga eller lykta i mörker." },
  { id:"fo14", area:"fordon", fraga:"Vad gäller för bilens totalvikt?", alt:["Den får överskridas på korta resor","Den får aldrig överskridas","Den gäller bara på motorväg","Den spelar ingen roll med släp"], ratt:1, forklaring:"Bilens högsta tillåtna totalvikt får aldrig överskridas. Överlast försämrar väghållning och bromsar och är förbjuden." },
  { id:"fo15", area:"fordon", fraga:"Var bör du placera tung last i bilen?", alt:["Högt upp och långt bak","Lågt och så centrerat som möjligt","I framsätet","Det spelar ingen roll"], ratt:1, forklaring:"Tung last placeras lågt och centrerat så att bilens tyngdpunkt och köregenskaper påverkas så lite som möjligt." },
  { id:"fo16", area:"fordon", fraga:"Hur påverkas bromssträckan av slitna däck på blöt väg?", alt:["Den blir kortare","Den blir längre","Den påverkas inte","Bilen bromsar bättre"], ratt:1, forklaring:"Slitna däck leder bort vatten sämre, vilket ger sämre grepp och längre bromssträcka – och ökad risk för vattenplaning." },
  { id:"fo17", area:"fordon", fraga:"Varför är fungerande vindrutetorkare och spolarvätska viktiga?", alt:["För att spara bränsle","För att du ska ha god sikt","För att bilen ska gå fortare","De behövs bara på vintern"], ratt:1, forklaring:"Ren vindruta är avgörande för sikten. Smuts och insekter kan kraftigt försämra hur mycket du ser." },
  { id:"fo18", area:"fordon", fraga:"Vad bör du kontrollera innan en längre resa?", alt:["Bara bränslenivån","Däck, däcktryck, ljus, vätskor och bromsar","Endast radion","Ingenting, bilen klarar sig"], ratt:1, forklaring:"En enkel säkerhetskontroll av däck, ljus, vätskor och bromsar minskar risken för haveri och olyckor på resan." },
  { id:"fo19", area:"fordon", fraga:"Vad är syftet med däckens mönster?", alt:["Bara utseendet","Att leda bort vatten och ge grepp","Att bilen ska gå fortare","Att spara bränsle enbart"], ratt:1, forklaring:"Mönstret leder bort vatten och snö så att däcket behåller greppet. Slitet mönster ökar risken för vattenplaning." },
  { id:"fo20", area:"fordon", fraga:"Vad bör du göra om ett däck punkterar under färd?", alt:["Bromsa kraftigt","Hålla stadigt i ratten, sakta ner mjukt och köra åt sidan","Gasa mer","Vända direkt"], ratt:1, forklaring:"Vid punktering håller du stadigt i ratten, släpper gasen och bromsar mjukt samt styr lugnt till en säker plats." },
  { id:"fo21", area:"fordon", fraga:"Varför ska du ha samma typ av däck runt om på bilen?", alt:["Det ser snyggare ut","För jämna och förutsägbara köregenskaper","Det är billigare","Det spelar ingen roll"], ratt:1, forklaring:"Olika däcktyper (t.ex. sommar och vinter blandat) ger ojämnt grepp och kan göra bilen svårkontrollerad." },
  { id:"fo22", area:"fordon", fraga:"Vad innebär understyrning?", alt:["Bilen svänger mer än du styr","Framhjulen tappar grepp och bilen vill fortsätta rakt fram","Bakhjulen släpper","Ratten låser sig"], ratt:1, forklaring:"Vid understyrning tappar framhjulen greppet och bilen svänger mindre än du styr – vanligt vid för hög fart in i en kurva." },
  { id:"fo23", area:"fordon", fraga:"Vad gör servostyrningen?", alt:["Bromsar bilen","Gör ratten lättare att vrida","Ökar motoreffekten","Tänder lyktorna"], ratt:1, forklaring:"Servostyrning gör det lättare att styra. Om den slutar fungera blir ratten mycket tyngre, men bilen går fortfarande att styra." },
  { id:"fo24", area:"fordon", fraga:"När ska du byta till vinterdäck?", alt:["Först när det snöar mycket","I god tid inför vinterväglag (krav 1 dec–31 mars vid vinterväglag)","Aldrig","Bara om du kör långt"], ratt:1, forklaring:"Vinterdäck krävs vid vinterväglag 1 december–31 mars. Byt i god tid innan halkan kommer." },
  { id:"fo25", area:"fordon", fraga:"Vad betyder det om bromspedalen känns mjuk eller går i botten?", alt:["Allt är normalt","Det kan vara fel på bromssystemet – åtgärda genast","Du bromsar för hårt","Bilen är för kall"], ratt:1, forklaring:"En mjuk eller bottnande bromspedal kan tyda på luft i systemet eller bromsfel. Det är allvarligt och måste åtgärdas omedelbart." },
  { id:"fo26", area:"fordon", fraga:"Vilken belysning ska vara tänd när du kör i dagsljus?", alt:["Inga lyktor","Halvljus eller varselljus","Endast helljus","Endast dimljus"], ratt:1, forklaring:"I Sverige ska bilen ha halvljus eller varselljus tänt även i dagsljus, så att fordonet syns bättre." },
  { id:"fo27", area:"fordon", fraga:"Vad är risken med att köra med för hög last bak i bilen?", alt:["Inget","Sämre väghållning och längre bromssträcka","Bilen drar mindre bränsle","Strålkastarna lyser bättre"], ratt:1, forklaring:"För mycket vikt baktill kan lätta framhjulen, försämra styrning och bromsar samt rikta upp strålkastarna så att du bländar andra." },
  { id:"fo28", area:"fordon", fraga:"Vad gäller för att dra en släpvagn med B-körkort?", alt:["Vilken vikt som helst","Det finns viktgränser beroende på körkortsbehörighet","Endast tomma släp","Inga regler alls"], ratt:1, forklaring:"Med vanligt B-körkort finns viktgränser för släp. Tyngre kombinationer kräver utökad behörighet (B96 eller BE)." },
  { id:"fo29", area:"fordon", fraga:"Hur märker du att bromsarna kan vara slitna?", alt:["Bilen luktar nytt","Gnissel, sämre bromsverkan eller längre bromssträcka","Radion brusar","Rutorna immar"], ratt:1, forklaring:"Tecken på slitna bromsar är gnissel/skrap, svampig pedal eller försämrad bromsverkan. Låt kontrollera dem direkt." },
  { id:"fo30", area:"fordon", fraga:"Vad är viktigt med bilens däcktryck inför en tungt lastad resa?", alt:["Sänk trycket","Höj trycket enligt tillverkarens rekommendation för last","Trycket spelar ingen roll","Töm däcken delvis"], ratt:1, forklaring:"Vid tung last bör däcktrycket ofta höjas enligt tillverkarens anvisning för att behålla väghållning och minska slitage." },
  { id:"fo31", area:"fordon", fraga:"Vad gör en korrekt inställd nackskydd (huvudstöd)?", alt:["Höjer komforten enbart","Minskar risken för pisksnärtskada vid påkörning bakifrån","Värmer nacken","Påverkar inget"], ratt:1, forklaring:"Ett rätt inställt nackskydd, i nivå med huvudet, minskar risken för pisksnärtskada om bilen blir påkörd bakifrån." },
  { id:"fo32", area:"fordon", fraga:"Varför är det viktigt att vindrutan är hel och ren?", alt:["Bara för utseendet","För god sikt och säkerhet; sprickor kan försämra sikten och hållfastheten","Det påverkar bränslet","Det krävs inte"], ratt:1, forklaring:"En ren och hel vindruta är avgörande för sikten. Stenskott och sprickor i synfältet ska åtgärdas." },
  { id:"fo33", area:"fordon", fraga:"Vad indikerar en tänd lampa för motortemperatur (röd)?", alt:["Motorn är lagom varm","Motorn är överhettad – stanna och låt den svalna","Det är dags att tanka","Däcktrycket är lågt"], ratt:1, forklaring:"En röd temperaturlampa betyder att motorn är för varm. Stanna säkert och låt den svalna för att undvika motorskada." },
  { id:"fo34", area:"fordon", fraga:"Hur påverkar dubbdäck väggreppet på is?", alt:["Sämre grepp","Bättre grepp på is och hårt packad snö","Ingen skillnad","De fungerar bara på sommaren"], ratt:1, forklaring:"Dubbdäck ger bättre grepp på is och hårt packad snö, men sliter mer på barmark och får användas under en begränsad period." },
  { id:"fo35", area:"fordon", fraga:"Vad bör du göra med backspeglarna innan du kör?", alt:["Vika in dem","Ställa in dem så att du minimerar döda vinklar","Ta bort dem","Rikta dem mot dig själv"], ratt:1, forklaring:"Ställ in speglarna innan färd så att du ser bakåt och får minsta möjliga döda vinkel. Kontrollera ändå alltid över axeln." },
  { id:"fo36", area:"fordon", fraga:"Vad är ett tecken på att stötdämparna är slitna?", alt:["Bilen blir tystare","Bilen guppar och väghållningen försämras","Bättre bränsleekonomi","Starkare strålkastare"], ratt:1, forklaring:"Slitna stötdämpare ger sämre väghållning, bilen guppar mer och bromssträckan kan bli längre. Låt kontrollera dem." },

  // ===== VÄGLAG & VÄDER =====
  { id:"vl1", area:"vaglag", fraga:"Vad består din stoppsträcka av?", alt:["Bara bromssträckan","Reaktionssträcka + bromssträcka","Bara reaktionssträckan","Avståndet till bilen framför"], ratt:1, forklaring:"Stoppsträckan är summan av reaktionssträckan (innan du börjar bromsa) och bromssträckan (tills bilen står still)." },
  { id:"vl2", area:"vaglag", fraga:"Hur påverkas bromssträckan om du dubblar hastigheten?", alt:["Den blir dubbelt så lång","Den blir ungefär fyra gånger så lång","Den blir tre gånger så lång","Den påverkas inte"], ratt:1, forklaring:"Bromssträckan ökar med kvadraten på hastigheten – dubbel fart ger ungefär fyrdubbel bromssträcka." },
  { id:"vl3", area:"vaglag", fraga:"Ungefär hur lång är en normal reaktionstid?", alt:["0,1 sekund","Cirka 1 sekund","5 sekunder","10 sekunder"], ratt:1, forklaring:"En normal reaktionstid är ungefär 1 sekund. Trötthet, alkohol och distraktion gör den längre." },
  { id:"vl4", area:"vaglag", fraga:"Vad är vattenplaning?", alt:["När bromsarna blir blöta","När däcken tappar kontakt med vägen och glider på en vattenfilm","När vindrutan immar igen","När motorn får vatten"], ratt:1, forklaring:"Vid vattenplaning byggs en vattenkil upp framför däcket så att det tappar kontakten med vägbanan. Du tappar både styrning och bromsverkan." },
  { id:"vl5", area:"vaglag", fraga:"Vad gör du om bilen börjar vattenplana?", alt:["Bromsar kraftigt","Släpper gasen, håller ratten stilla och undviker att bromsa hårt","Gasar mer","Svänger snabbt"], ratt:1, forklaring:"Släpp gasen och håll ratten stilla tills däcken får grepp igen. Tvära rörelser eller hård inbromsning gör det värre." },
  { id:"vl6", area:"vaglag", fraga:"Vid vilken temperatur är halkrisken ofta som störst?", alt:["Runt 0 grader","Vid –20 grader","Vid +10 grader","Vid +20 grader"], ratt:0, forklaring:"Kring noll grader kan vägen växla mellan vått och isigt, och underkylt regn ger blixthalka. Då är risken som störst." },
  { id:"vl7", area:"vaglag", fraga:"Vilket ljus ska du använda i tät dimma?", alt:["Helljus","Halvljus (och eventuellt dimljus)","Inget ljus alls","Parkeringsljus"], ratt:1, forklaring:"Använd halvljus och vid behov dimljus. Helljus reflekteras tillbaka i dimman och försämrar sikten." },
  { id:"vl8", area:"vaglag", fraga:"Vad är särskilt svårt vid mörkerkörning?", alt:["Att höra motorn","Att bedöma avstånd och hastighet samt upptäcka oskyddade trafikanter","Att hålla i ratten","Att tanka bilen"], ratt:1, forklaring:"I mörker är det svårare att bedöma avstånd och fart och att upptäcka gående och cyklister i tid. Sänk farten." },
  { id:"vl9", area:"vaglag", fraga:"Du blir bländad av solen eller en mötande bil. Vad gör du?", alt:["Blundar en kort stund","Sänker farten och riktar blicken mot vägens högra kant","Gasar för att passera snabbt","Stänger av ljuset"], ratt:1, forklaring:"Sänk farten och använd vägens högra kant och kantlinjen som ledning tills bländningen upphör." },
  { id:"vl10", area:"vaglag", fraga:"Hur bör du köra på vått väglag?", alt:["Som på torr väg","Sänka farten och öka avståndet till fordonet framför","Öka farten","Köra närmare bilen framför"], ratt:1, forklaring:"Vått väglag ger längre bromssträcka och risk för vattenplaning. Sänk farten och håll större avstånd." },
  { id:"vl11", area:"vaglag", fraga:"Vad påverkar din bromssträcka?", alt:["Endast bilens färg","Hastighet, väglag och däckens skick","Bara hur ny bilen är","Antalet passagerare enbart"], ratt:1, forklaring:"Bromssträckan beror främst på hastigheten, väglaget (torrt, vått, isigt) och däckens grepp." },
  { id:"vl12", area:"vaglag", fraga:"Var fryser vägbanan ofta först?", alt:["Mitt i städer","På broar och i skuggiga partier","I uppförsbackar","Vid bensinstationer"], ratt:1, forklaring:"Broar kyls från flera håll och skuggiga partier värms inte av solen – där bildas is först." },
  { id:"vl13", area:"vaglag", fraga:"Hur bör du bromsa på isig väg?", alt:["Hårt och plötsligt","Mjukt och i god tid","Med handbromsen","Genom att gasa"], ratt:1, forklaring:"På is har du litet grepp. Bromsa mjukt och tidigt, och undvik tvära rörelser som kan få bilen att sladda." },
  { id:"vl14", area:"vaglag", fraga:"Hur ska avståndet till fordonet framför ändras vid dåligt väder?", alt:["Minskas","Ökas","Vara oförändrat","Spelar ingen roll"], ratt:1, forklaring:"Vid regn, snö och halka behöver du ännu större avstånd än de vanliga 3 sekunderna eftersom bromssträckan blir längre." },
  { id:"vl15", area:"vaglag", fraga:"När ska dimbakljuset användas?", alt:["Alltid i mörker","Vid kraftigt nedsatt sikt, t.ex. tät dimma – och släckas när sikten blir bättre","Vid regn alltid","Aldrig"], ratt:1, forklaring:"Dimbakljus används bara vid kraftigt nedsatt sikt. Lämnar du det tänt i klart väder bländar du bakomvarande." },
  { id:"vl16", area:"vaglag", fraga:"Hur lång kan bromssträckan bli på is jämfört med på torr asfalt?", alt:["Ungefär lika lång","Flera gånger längre","Kortare","Hälften så lång"], ratt:1, forklaring:"På is kan bromssträckan bli många gånger längre än på torr asfalt. Sänk farten och öka avståndet rejält." },
  { id:"vl17", area:"vaglag", fraga:"Vad bör du göra när du kör in i ett område med dimma?", alt:["Öka farten för att passera snabbt","Sänka farten och öka avståndet","Slå på helljuset","Köra tätt bakom bilen framför"], ratt:1, forklaring:"I dimma sänker du farten, ökar avståndet och använder halvljus (samt dimljus vid behov), eftersom sikten är kraftigt begränsad." },
  { id:"vl18", area:"vaglag", fraga:"Vad gör du om bilen börjar sladda med bakvagnen vid halka?", alt:["Bromsar hårt","Släpper gasen och styr mjukt i den riktning du vill åka","Gasar mer","Vrider ratten åt motsatt håll snabbt"], ratt:1, forklaring:"Vid sladd släpper du gasen och styr lugnt dit du vill köra. Undvik hård inbromsning och tvära rattrörelser." },
  { id:"vl19", area:"vaglag", fraga:"Hur påverkar regn och vått väglag sikten och greppet?", alt:["Förbättrar båda","Försämrar både sikt och grepp","Påverkar bara ljudet","Ingen påverkan"], ratt:1, forklaring:"Regn ger sämre sikt (stänk, immiga rutor) och sämre grepp. Sänk farten och håll större avstånd." },
  { id:"vl20", area:"vaglag", fraga:"Vad är extra viktigt vid körning i stark sidvind?", alt:["Att köra fortare","Att hålla stadigt i ratten och vara beredd på vindstötar","Att veva ner rutan","Att slå på dimljus"], ratt:1, forklaring:"Sidvind kan tränga bilen i sidled, särskilt vid omkörningar, broar och öppna fält. Håll stadigt i ratten och sänk farten." },
  { id:"vl21", area:"vaglag", fraga:"Varför är de första regndropparna efter en torrperiod extra hala?", alt:["De är kallare","Vatten blandas med damm och olja till en hal hinna","De är surare","Det stämmer inte"], ratt:1, forklaring:"Efter torrt väder bildar regnet tillsammans med damm, gummi och olja en hal hinna på vägen tills den spolats ren." },
  { id:"vl22", area:"vaglag", fraga:"Hur kör du säkrast i en lång nedförsbacke på hal väg?", alt:["Bromsar hårt hela tiden","Använder låg växel och motorbroms, bromsar lugnt","Lägger i friläge","Ökar farten"], ratt:1, forklaring:"Med låg växel och motorbroms behåller du kontrollen och slipper överhettade bromsar. Bromsa mjukt vid behov." },
  { id:"vl23", area:"vaglag", fraga:"Vad innebär det att 'köra på sikt'?", alt:["Att köra med blicken i backspegeln","Att anpassa farten så att du kan stanna inom den sträcka du ser","Att alltid hålla hastighetsgränsen","Att köra efter GPS"], ratt:1, forklaring:"Att köra på sikt betyder att hastigheten anpassas så att du kan stanna inom den vägsträcka du överblickar – viktigt i mörker, dimma och kurvor." },
  { id:"vl24", area:"vaglag", fraga:"Hur påverkar mörker din förmåga att upptäcka fotgängare?", alt:["Den blir bättre","Den försämras kraftigt, särskilt om de är mörkklädda","Ingen påverkan","Bara om det regnar"], ratt:1, forklaring:"I mörker är mörkklädda fotgängare svåra att se. Sänk farten och var extra uppmärksam, särskilt utan gatubelysning." },
  { id:"vl25", area:"vaglag", fraga:"Vad bör du göra om vägen plötsligt blir isig på en bro?", alt:["Bromsa kraftigt på bron","Ha redan sänkt farten innan bron och köra mjukt","Gasa över snabbt","Svänga tvärt"], ratt:1, forklaring:"Broar fryser först. Sänk farten i god tid före bron och kör mjukt utan tvära manövrer, eftersom greppet kan vara mycket dåligt." },
  { id:"vl26", area:"vaglag", fraga:"Vad är viktigast för att undvika vattenplaning?", alt:["Höga farter","Lagom fart och däck med bra mönsterdjup","Smala däck","Hårt uppumpade däck enbart"], ratt:1, forklaring:"Lägre fart och däck med tillräckligt mönsterdjup minskar risken för vattenplaning, eftersom vattnet hinner ledas bort." },
  { id:"vl27", area:"vaglag", fraga:"Hur påverkas reaktionssträckan av att du är trött eller distraherad?", alt:["Den blir kortare","Den blir längre","Den påverkas inte","Den försvinner"], ratt:1, forklaring:"Trötthet, alkohol och distraktion förlänger reaktionstiden, vilket gör reaktionssträckan – och därmed stoppsträckan – längre." },
  { id:"vl28", area:"vaglag", fraga:"Vilket ljus använder du vid körning i kraftigt snöfall i mörker?", alt:["Helljus","Halvljus","Inget ljus","Endast parkeringsljus"], ratt:1, forklaring:"Vid snöfall används halvljus. Helljus reflekteras i snöflingorna och försämrar sikten, precis som i dimma." },
  { id:"vl29", area:"vaglag", fraga:"Vad bör du tänka på när vägen är täckt av löv på hösten?", alt:["Löv ökar greppet","Blöta löv kan vara hala – sänk farten","Löv påverkar inget","Du ska gasa över"], ratt:1, forklaring:"Blöta löv kan vara mycket hala, särskilt i kurvor och vid inbromsning. Sänk farten och kör mjukt." },
  { id:"vl30", area:"vaglag", fraga:"Hur bör du anpassa avståndet när väglaget är dåligt?", alt:["Minska det","Öka det jämfört med torra förhållanden","Hålla samma","Köra utan avstånd"], ratt:1, forklaring:"Vid halka, regn eller snö behöver du större avstånd än de vanliga 3 sekunderna, eftersom bromssträckan blir längre." },

  // ===== RISKBETEENDEN =====
  { id:"ri1", area:"risk", fraga:"Vid vilken alkoholhalt i blodet räknas det som rattfylleri?", alt:["0,2 ‰","0,5 ‰","0,8 ‰","1,0 ‰"], ratt:0, forklaring:"Gränsen för rattfylleri i Sverige är 0,2 promille alkohol i blodet." },
  { id:"ri2", area:"risk", fraga:"Vid vilken alkoholhalt räknas det normalt som grovt rattfylleri?", alt:["0,2 ‰","0,5 ‰","1,0 ‰","2,0 ‰"], ratt:2, forklaring:"Vid 1,0 promille eller mer räknas det normalt som grovt rattfylleri, vilket kan ge fängelse." },
  { id:"ri3", area:"risk", fraga:"Hur påverkar alkohol din körförmåga?", alt:["Den förbättras","Omdöme, reaktionsförmåga och syn försämras","Bara synen påverkas","Ingen påverkan vid små mängder"], ratt:1, forklaring:"Alkohol försämrar omdöme, reaktionsförmåga, koncentration och syn – ofta innan du själv märker det." },
  { id:"ri4", area:"risk", fraga:"Ungefär hur snabbt bryter kroppen ned alkohol?", alt:["Cirka 0,1 ‰ per timme","1 ‰ per timme","Direkt","2 ‰ per timme"], ratt:0, forklaring:"Kroppen bryter ned ungefär 0,1 promille per timme. Det går alltså inte att snabba på processen." },
  { id:"ri5", area:"risk", fraga:"Vad hjälper för att snabbare bli nykter?", alt:["Kaffe","En kall dusch","Att äta","Ingenting – bara tid"], ratt:3, forklaring:"Varken kaffe, dusch eller mat påverkar nedbrytningen. Endast tid gör dig nykter." },
  { id:"ri6", area:"risk", fraga:"Vad gäller för narkotika och bilkörning?", alt:["Tillåtet i små mängder","Nolltolerans – det är helt förbjudet","Tillåtet dagen efter","Bara förbjudet för nya förare"], ratt:1, forklaring:"För narkotika gäller nolltolerans i trafiken. Det är helt förbjudet att köra påverkad av narkotika." },
  { id:"ri7", area:"risk", fraga:"Hur kan du veta om en medicin kan påverka din körförmåga?", alt:["Det går inte att veta","Genom varningstriangeln på förpackningen och att fråga apoteket eller läkare","Mediciner påverkar aldrig","Bara receptfria mediciner påverkar"], ratt:1, forklaring:"En röd varningstriangel på läkemedlet visar att det kan påverka körförmågan. Fråga apoteket eller din läkare om du är osäker." },
  { id:"ri8", area:"risk", fraga:"Vad är den farligaste följden av att köra trött?", alt:["Att du kör för fort","Mikrosömn – några sekunders ofrivillig sömn","Att du blir hungrig","Att du glömmer vägen"], ratt:1, forklaring:"Mikrosömn innebär att du somnar några sekunder utan att märka det. På hög fart hinner bilen långt helt utan kontroll." },
  { id:"ri9", area:"risk", fraga:"Vad är det enda som verkligen hjälper mot trötthet bakom ratten?", alt:["Att veva ner rutan","Att höja musiken","Att stanna och vila eller sova","Att äta godis"], ratt:2, forklaring:"Friskluft och musik ger bara kortvarig effekt. Det enda som hjälper är att stanna och vila eller sova en stund." },
  { id:"ri10", area:"risk", fraga:"Vilket är ett tidigt tecken på trötthet vid körning?", alt:["Du ser bättre","Gäspningar, tunga ögonlock och att du missar skyltar","Du blir piggare","Du kör rakare"], ratt:1, forklaring:"Gäspningar, tunga ögonlock, sicksackkörning och att man missar skyltar är tecken på att du behöver vila." },
  { id:"ri11", area:"risk", fraga:"Vad gäller för mobiltelefon under körning?", alt:["Den får hållas i handen om du kör sakta","Du får inte hålla mobilen i handen och måste ha full uppmärksamhet på trafiken","Det är alltid tillåtet","Endast samtal är tillåtet i handen"], ratt:1, forklaring:"Du får inte hålla mobilen i handen under körning. Att läsa eller skriva tar blicken från vägen flera sekunder – mycket farligt." },
  { id:"ri12", area:"risk", fraga:"Hur påverkar stress och ilska din körning?", alt:["Den blir säkrare","Omdömet försämras och du tar farligare beslut","Ingen påverkan","Du kör långsammare och säkrare"], ratt:1, forklaring:"Stress och ilska gör att du fattar sämre och mer impulsiva beslut. Försök lugna ner dig innan och under körning." },
  { id:"ri13", area:"risk", fraga:"Varför är grupptryck en risk, särskilt för unga förare?", alt:["Det gör körningen tryggare","Det kan få dig att köra fortare eller ta större risker än du vill","Det påverkar inte alls","Det gäller bara passagerare"], ratt:1, forklaring:"Att vilja imponera eller ge efter för kompisar kan leda till högre fart och farligare beteende. Stå emot trycket." },
  { id:"ri14", area:"risk", fraga:"Varför är nattkörning extra riskfyllt?", alt:["Vägarna är sämre på natten","Kroppen är inställd på sömn, vilket ökar trötthetsrisken","Det är alltid halt på natten","Bilen drar mer bränsle"], ratt:1, forklaring:"På natten är kroppens dygnsrytm inställd på sömn. Trötthet och mikrosömn är därför vanligare nattetid." },
  { id:"ri15", area:"risk", fraga:"Kan du vara påverkad av alkohol morgonen efter en fest?", alt:["Nej, alltid nykter på morgonen","Ja, alkohol kan finnas kvar i blodet länge","Bara om du druckit sprit","Endast om du sovit dåligt"], ratt:1, forklaring:"Eftersom alkohol bryts ned långsamt kan du fortfarande vara över gränsen på morgonen, även om du känner dig pigg." },
  { id:"ri16", area:"risk", fraga:"Hur påverkar högre hastighet skaderisken vid en olycka?", alt:["Den minskar","Den ökar kraftigt och stoppsträckan blir längre","Ingen påverkan","Den ökar bara på landsväg"], ratt:1, forklaring:"Högre fart ger längre stoppsträcka och mycket större krockvåld. Skaderisken stiger snabbt med hastigheten." },
  { id:"ri17", area:"risk", fraga:"Du är för trött för att köra säkert. Vad är bäst?", alt:["Köra ändå men långsammare","Ta en paus och vila, eller låta någon annan köra","Dricka energidryck och fortsätta","Köra med vevad ruta"], ratt:1, forklaring:"Är du för trött ska du inte köra. Vila, sov eller låt en utvilad förare ta över." },
  { id:"ri18", area:"risk", fraga:"Hur kan sjukdom eller feber påverka körningen?", alt:["Inte alls","Den kan försämra koncentration och reaktionsförmåga","Den gör dig piggare","Bara om du hostar"], ratt:1, forklaring:"Sjukdom, feber och vissa symtom försämrar koncentration och reaktion. Avstå från att köra om du känner dig dålig." },
  { id:"ri19", area:"risk", fraga:"Vad är en stor risk även vid små mängder alkohol?", alt:["Att du kör för sakta","Att du överskattar din egen förmåga och tar fler risker","Att bilen drar mer bränsle","Inget"], ratt:1, forklaring:"Redan små mängder alkohol kan göra att du överskattar din förmåga och tar risker du normalt skulle undvika." },
  { id:"ri20", area:"risk", fraga:"Vad händer om du kombinerar alkohol med trötthet eller vissa mediciner?", alt:["Effekterna tar ut varandra","Effekterna kan förstärka varandra och bli farligare","Inget särskilt","Du blir piggare"], ratt:1, forklaring:"Alkohol tillsammans med trötthet eller vissa läkemedel kan förstärka varandra och kraftigt försämra körförmågan." },
  { id:"ri21", area:"risk", fraga:"Hur lång tid tar det innan kroppen brutit ned alkoholen efter en kväll med mycket drickande?", alt:["Någon timme","Det kan ta många timmar, ibland in på nästa dag","Direkt på morgonen","En kvart"], ratt:1, forklaring:"Eftersom alkohol bryts ned långsamt (ca 0,1 ‰/timme) kan du vara påverkad långt in på nästa dag. Räkna med gott om tid." },
  { id:"ri22", area:"risk", fraga:"Vad är 'tunnelseende' som kan uppstå vid hög fart eller stress?", alt:["Bättre sidoseende","Att synfältet smalnar av så att du missar saker vid sidorna","Att du ser bättre i mörker","Ett fel på ögat"], ratt:1, forklaring:"Vid hög fart och stress smalnar synfältet, vilket gör att du lättare missar t.ex. korsande fotgängare eller cyklister." },
  { id:"ri23", area:"risk", fraga:"Varför är det farligt att köra direkt efter en kraftigt känslomässig händelse (t.ex. ett gräl)?", alt:["Det är inte farligt","Starka känslor försämrar koncentration och omdöme","Bilen drar mer bränsle","Det påverkar bara nattetid"], ratt:1, forklaring:"Ilska, sorg eller stress tar uppmärksamhet och försämrar omdömet. Lugna ner dig innan du kör." },
  { id:"ri24", area:"risk", fraga:"Vad är ett bra sätt att hantera trötthet på en längre resa?", alt:["Köra fortare för att komma fram snabbare","Planera in regelbundna pauser och vila","Dricka mycket kaffe och fortsätta","Köra på natten"], ratt:1, forklaring:"Regelbundna pauser och tillräcklig vila är det effektiva sättet. Kaffe ger bara kortvarig effekt." },
  { id:"ri25", area:"risk", fraga:"Hur påverkar hög musik och stoj i bilen körningen?", alt:["Förbättrar fokus","Kan ta uppmärksamhet och göra att du missar viktiga ljud och intryck","Ingen påverkan","Gör dig piggare och säkrare"], ratt:1, forklaring:"Hög ljudnivå och spring i bilen kan distrahera och göra att du missar t.ex. utryckningsfordon eller varningsljud." },
  { id:"ri26", area:"risk", fraga:"Vad bör du göra om du måste använda mobilen under körning?", alt:["Hålla den i handen kort","Vänta tills du säkert kan stanna, eller använda handsfree","Skriva snabbt vid rött ljus","Ringa medan du kör"], ratt:1, forklaring:"Du får inte hålla mobilen i handen. Använd handsfree eller stanna säkert – även korta blickar bort från vägen är farliga." },
  { id:"ri27", area:"risk", fraga:"Vilken grupp är överrepresenterad i singelolyckor med hög hastighet?", alt:["Äldre förare","Unga, oerfarna förare – särskilt i kombination med fart och risktagande","Bussförare","Cyklister"], ratt:1, forklaring:"Unga och oerfarna förare är överrepresenterade i olyckor, ofta kopplat till hög fart, risktagande och grupptryck." },
  { id:"ri28", area:"risk", fraga:"Vad ökar risken mest för en allvarlig olycka?", alt:["Att köra för sakta","Hög hastighet i kombination med andra risker som trötthet eller alkohol","Att hålla avstånd","Att använda blinkers"], ratt:1, forklaring:"Hög hastighet förvärrar alla andra risker och förlänger stoppsträckan, samtidigt som krockvåldet ökar kraftigt." },
  { id:"ri29", area:"risk", fraga:"Hur ska du tänka kring 'jag har bara druckit en öl'?", alt:["Det är alltid okej att köra","Även små mängder kan påverka och föra dig över gränsen 0,2 ‰","En öl ger aldrig påverkan","Det beror på bilen"], ratt:1, forklaring:"Redan en liten mängd alkohol kan påverka körförmågan och föra dig över gränsen. Säkrast är att inte dricka alls om du ska köra." },
  { id:"ri30", area:"risk", fraga:"Vad är ett tecken på att du borde ta en paus?", alt:["Du känner dig pigg","Du har svårt att hålla fokus, gäspar och tappar uppmärksamheten","Du sjunger med i radion","Du ser tydligt"], ratt:1, forklaring:"Koncentrationssvårigheter, gäspningar och att tankarna vandrar är tecken på trötthet – ta en paus och vila." },
  { id:"ri31", area:"risk", fraga:"Hur påverkar receptbelagda lugnande mediciner körförmågan?", alt:["De förbättrar den","De kan ge trötthet och nedsatt reaktion – kolla varningstriangeln","De påverkar aldrig","Endast på fastande mage"], ratt:1, forklaring:"Många lugnande och smärtstillande läkemedel kan ge trötthet och nedsatt reaktionsförmåga. Läs bipacksedeln och fråga vården." },
  { id:"ri32", area:"risk", fraga:"Vad bör du göra om en passagerare stör eller uppmanar till risktagande?", alt:["Göra som de säger","Lugnt avstå och köra säkert – du som förare har ansvaret","Köra fortare","Strunta i trafikreglerna"], ratt:1, forklaring:"Som förare ansvarar du för bilen. Låt dig inte påverkas av grupptryck utan kör alltid säkert och lagligt." },
  { id:"ri33", area:"risk", fraga:"Varför är det viktigt att planera resan när du är pigg?", alt:["Det är inte viktigt","Beslut och bedömningar blir sämre när du är trött","Bilen kör bättre på morgonen","Det sparar bränsle enbart"], ratt:1, forklaring:"Trötthet försämrar omdöme och beslut. Planera långkörningar med vila och undvik de tider då du brukar vara som tröttast." },
  { id:"ri34", area:"risk", fraga:"Hur snabbt kan en mikrosömn inträffa?", alt:["Bara efter flera timmar","Plötsligt och utan förvarning, även i några sekunder","Aldrig under körning","Endast på natten"], ratt:1, forklaring:"Mikrosömn kan slå till plötsligt i bara några sekunder. På motorvägsfart hinner bilen långt utan att du har kontroll." },
  { id:"ri35", area:"risk", fraga:"Vad är säkrast om du känner dig påverkad eller osäker på om du får köra?", alt:["Köra ändå","Låt bli att köra och välj ett annat sätt att ta dig hem","Köra långsamt","Köra på mindre vägar"], ratt:1, forklaring:"Är du osäker ska du avstå. Ta taxi, kollektivt eller låt någon nykter och utvilad köra." },
  { id:"ri36", area:"risk", fraga:"Hur påverkar rutin och vana risken för ouppmärksamhet?", alt:["Vana eliminerar all risk","På välkända sträckor kan man bli ouppmärksam och 'gå på autopilot'","Vana gör dig alltid säkrare","Det påverkar inget"], ratt:1, forklaring:"På välkända vägar kan uppmärksamheten sjunka. Var medveten om risken och håll fokus även på rutinsträckor." },
  { id:"ri37", area:"risk", fraga:"Vad är en risk med att äta, dricka eller sminka sig under körning?", alt:["Inget","Du tar händer och blick från körningen","Det sparar tid säkert","Det ökar fokus"], ratt:1, forklaring:"Allt som tar händerna eller blicken från körningen är en distraktion som ökar olycksrisken. Gör det före eller efter resan." },
  { id:"ri38", area:"risk", fraga:"Vad gäller om du tar narkotikaklassade läkemedel enligt recept?", alt:["Du får aldrig köra","Du kan få köra om läkaren bedömt det säkert och du följer ordinationen","Det är samma som olovligt bruk","Endast på helger"], ratt:1, forklaring:"Narkotikaklassade läkemedel som tas enligt läkares ordination kan vara tillåtna, men endast om de inte påverkar körförmågan negativt." },
  { id:"ri39", area:"risk", fraga:"Hur kan stress påverka din hastighet?", alt:["Du kör alltid långsammare","Du kan omedvetet köra fortare och ta fler risker","Ingen påverkan","Du parkerar bättre"], ratt:1, forklaring:"Stress och tidspress leder ofta till högre fart och sämre beslut. Ge dig själv god tid så minskar risktagandet." },
  { id:"ri40", area:"risk", fraga:"Vilket är det säkraste valet kvällen innan du ska köra tidigt?", alt:["Festa och sova lite","Få tillräckligt med sömn och avstå från alkohol","Dricka måttligt","Sova en timme extra på morgonen"], ratt:1, forklaring:"God sömn och ingen alkohol kvällen innan ger bäst förutsättningar för en pigg och säker körning dagen efter." },

  // ===== SAMSPEL I TRAFIKEN =====
  { id:"sa1", area:"samspel", fraga:"Vilka räknas som oskyddade trafikanter?", alt:["Bilförare","Fotgängare, cyklister, mopedister och motorcyklister","Bussförare","Lastbilschaufförer"], ratt:1, forklaring:"Oskyddade trafikanter saknar karossens skydd. De skadas lätt allvarligt och kräver din extra hänsyn." },
  { id:"sa2", area:"samspel", fraga:"Varför är det extra viktigt att visa hänsyn mot oskyddade trafikanter?", alt:["De kör fortast","De saknar skydd och skadas lätt allvarligt vid en kollision","De har alltid företräde","De syns alltid bra"], ratt:1, forklaring:"Utan skydd blir följderna av en krock mycket allvarligare för dem. Anpassa fart och avstånd därefter." },
  { id:"sa3", area:"samspel", fraga:"Du ska svänga höger och en cyklist kör rakt fram på cykelbanan bredvid dig. Vad gäller?", alt:["Du har företräde","Du har väjningsplikt mot cyklisten","Cyklisten måste stanna","Du tutar och svänger"], ratt:1, forklaring:"När du korsar en cykelbana vid sväng har du väjningsplikt mot cyklisten som kör rakt fram." },
  { id:"sa4", area:"samspel", fraga:"Vad bör du särskilt kontrollera innan du byter körfält eller svänger?", alt:["Bränslemätaren","Den döda vinkeln genom att titta över axeln","Radiokanalen","Klockan"], ratt:1, forklaring:"Speglarna täcker inte allt. Titta över axeln för att kontrollera den döda vinkeln innan körfältsbyte eller sväng." },
  { id:"sa5", area:"samspel", fraga:"Hur bör du betrakta barns beteende i trafiken?", alt:["Som vuxnas","Som oberäkneligt – de kan agera plötsligt och förstår inte alltid faran","Som alltid försiktigt","Som bilförares"], ratt:1, forklaring:"Barn är korta, syns dåligt och kan springa ut utan att titta. Sänk farten och var beredd att stanna." },
  { id:"sa6", area:"samspel", fraga:"En boll rullar ut i gatan framför dig. Vad gör du?", alt:["Kör vidare som vanligt","Bromsar och är beredd – ett barn kan komma efter bollen","Tutar","Ökar farten"], ratt:1, forklaring:"Efter en boll kommer ofta ett barn springande. Sänk farten och var beredd att stanna." },
  { id:"sa7", area:"samspel", fraga:"Hur bör du köra vid skolor och lekplatser?", alt:["Som vanligt","Sänka farten och vara extra uppmärksam på barn","Öka farten för att passera snabbt","Köra närmare trottoaren"], ratt:1, forklaring:"Vid skolor, lekplatser och bostadsområden rör sig många barn. Sänk farten och var extra vaksam." },
  { id:"sa8", area:"samspel", fraga:"Hur visar du hänsyn mot en äldre fotgängare vid ett övergångsställe?", alt:["Tutar för att skynda på","Ger personen gott om tid att gå över","Kör tätt förbi","Blinkar med helljuset"], ratt:1, forklaring:"Äldre kan röra sig långsammare. Ge dem tid och stressa aldrig fram någon som korsar vägen." },
  { id:"sa9", area:"samspel", fraga:"Vad är viktigt när du kör om en cyklist?", alt:["Köra så nära som möjligt","Hålla ett gott sidoavstånd","Tuta hela tiden","Köra om i hög fart tätt intill"], ratt:1, forklaring:"Ge cyklisten gott om sidoavstånd vid omkörning. Cyklister kan vingla och påverkas av din luftvirvel." },
  { id:"sa10", area:"samspel", fraga:"Varför ska du titta en extra gång efter motorcyklister?", alt:["De kör alltid för fort","De är smala och lätta att missa, särskilt i korsningar","De har inga lyktor","De syns bättre än bilar"], ratt:1, forklaring:"Motorcyklar är smala och hamnar lätt i döda vinkeln eller missas i korsningar. En extra blick kan rädda liv." },
  { id:"sa11", area:"samspel", fraga:"En buss står vid en hållplats. Vad bör du räkna med?", alt:["Att inga människor finns där","Att gående, särskilt barn, kan springa ut framför eller bakom bussen","Att bussen kör först","Att du har företräde"], ratt:1, forklaring:"Vid hållplatser kan människor korsa vägen oväntat. Sänk farten och var beredd att stanna." },
  { id:"sa12", area:"samspel", fraga:"När bör du ge tecken med blinkers för att samspelet ska fungera?", alt:["Precis i svängen","I god tid innan du svänger eller byter körfält","Efter manövern","Bara om någon är bakom"], ratt:1, forklaring:"Tydliga tecken i god tid gör att andra hinner förstå och anpassa sig efter din avsikt." },
  { id:"sa13", area:"samspel", fraga:"Vad kan ögonkontakt med en fotgängare användas till?", alt:["Att skrämmas","Att bekräfta att ni sett varandra och vem som går först","Inget","Att hälsa"], ratt:1, forklaring:"Ögonkontakt är ett enkelt sätt att kommunicera och försäkra sig om att man uppfattat varandra." },
  { id:"sa14", area:"samspel", fraga:"Hur bör du köra för att vara lätt att samspela med?", alt:["Oförutsägbart","Förutsägbart och utan plötsliga manövrar","Så fort som möjligt","Tätt bakom andra"], ratt:1, forklaring:"Förutsägbar körning gör att andra kan lita på vad du tänker göra, vilket minskar risken för missförstånd och olyckor." },
  { id:"sa15", area:"samspel", fraga:"Ett utryckningsfordon närmar sig med blåljus och siren. Vad gör du?", alt:["Kör fortare för att komma undan","Lämnar fri väg, kör åt sidan och stannar vid behov","Bromsar tvärt mitt i vägen","Ignorerar det"], ratt:1, forklaring:"Lämna fri väg åt utryckningsfordon. Kör lugnt åt sidan och stanna om det behövs, men blockera inte korsningar." },
  { id:"sa16", area:"samspel", fraga:"Du får grönt ljus men en fotgängare hinner inte över. Vad gör du?", alt:["Kör ändå","Väntar och låter personen gå klart","Tutar","Kör tätt förbi"], ratt:1, forklaring:"Även vid grönt måste du låta gående som redan är ute på övergångsstället gå klart innan du kör." },
  { id:"sa17", area:"samspel", fraga:"Varför är cyklister som befinner sig till höger om dig farliga när du ska svänga höger?", alt:["De kör för sakta","De kan hamna i din döda vinkel och köra rakt fram när du svänger","De finns aldrig där","De har alltid väjningsplikt"], ratt:1, forklaring:"En cyklist till höger kan lätt missas. Kontrollera noga och lämna företräde innan du svänger höger." },
  { id:"sa18", area:"samspel", fraga:"Hur visar du tydligast dina avsikter för andra trafikanter?", alt:["Genom att köra fort","Genom blinkers och rätt placering på vägen","Genom att tuta","Genom att blinka med ljuset"], ratt:1, forklaring:"Körriktningsvisare i kombination med korrekt placering visar tydligt vad du tänker göra." },
  { id:"sa19", area:"samspel", fraga:"Du ska passera en grupp cyklister på en smal väg. Vad gör du?", alt:["Kör om snabbt och tätt","Väntar tills du kan köra om med gott sidoavstånd","Tutar för att de ska flytta sig","Kör mellan dem"], ratt:1, forklaring:"Vänta tills du kan köra om säkert med betryggande sidoavstånd. Stressa inte fram en omkörning på smal väg." },
  { id:"sa20", area:"samspel", fraga:"En äldre person med rollator ska korsa vid ett övergångsställe. Vad är viktigast?", alt:["Att tuta","Att ge gott om tid och inte stressa","Att köra runt","Att blinka med helljus"], ratt:1, forklaring:"Visa tålamod och ge personen gott om tid. Stressa aldrig någon som korsar vägen, särskilt inte den som rör sig långsamt." },
  { id:"sa21", area:"samspel", fraga:"Hur bör du agera mot en cyklist som verkar osäker eller vinglar?", alt:["Köra tätt förbi","Hålla extra avstånd och vara beredd att sakta in","Tuta","Köra om i hög fart"], ratt:1, forklaring:"En osäker cyklist (t.ex. ett barn eller en äldre) kan göra oväntade rörelser. Håll extra avstånd och var beredd att bromsa." },
  { id:"sa22", area:"samspel", fraga:"Vad bör du tänka på vid en buss som du ska köra om?", alt:["Att passagerare kan kliva av och gå framför bussen","Inget särskilt","Att bussen alltid stannar","Att du har företräde"], ratt:0, forklaring:"Vid en buss kan gående röra sig framför eller bakom den. Sänk farten och var beredd på fotgängare som korsar vägen." },
  { id:"sa23", area:"samspel", fraga:"Hur samspelar du bäst med en lastbil som ska svänga höger i en korsning?", alt:["Köra upp på höger sida","Hålla dig bakom – lastbilen kan behöva svänga vänsterut först","Tuta","Köra om till vänster snabbt"], ratt:1, forklaring:"Långa fordon behöver ofta extra svängrum och kan svänga ut innan de vänder. Kör aldrig upp i den inre kurvan – du hamnar i förarens döda vinkel." },
  { id:"sa24", area:"samspel", fraga:"Vad är viktigt när du öppnar bildörren efter att ha parkerat vid en gata?", alt:["Öppna snabbt","Titta efter cyklister och trafik bakåt innan du öppnar","Det spelar ingen roll","Bara titta framåt"], ratt:1, forklaring:"Titta bakåt och i spegeln innan du öppnar dörren, så att du inte skadar en passerande cyklist eller annan trafikant." },
  { id:"sa25", area:"samspel", fraga:"Hur visar du hänsyn vid en buss som blinkar för att lämna en hållplats (väg ≤50 km/h)?", alt:["Kör om snabbt","Sänker farten och lämnar bussen företräde","Tutar","Blockerar bussen"], ratt:1, forklaring:"Där hastighetsgränsen är högst 50 km/h ska du lämna företräde åt en buss som signalerar att den ska lämna hållplatsen." },
  { id:"sa26", area:"samspel", fraga:"Du ser en motorcyklist i backspegeln som närmar sig. Vad bör du tänka på?", alt:["MC syns alltid bra","MC är smal och kan vara svår att bedöma avstånd och fart till","MC kör alltid sakta","Du kan ignorera den"], ratt:1, forklaring:"Det är svårare att bedöma fart och avstånd till en smal motorcykel. Var extra noggrann vid körfältsbyten och svängar." },
  { id:"sa27", area:"samspel", fraga:"Hur agerar du om någon bakom dig kör väldigt nära (tränger sig på)?", alt:["Bromsar tvärt för att markera","Behåller lugnet, håller jämn fart och låter dem köra om när det går","Ökar farten kraftigt","Gör en U-sväng"], ratt:1, forklaring:"Provocera inte med tvärbromsningar. Håll jämn fart och säkert avstånd framåt, och låt den påträngande föraren passera när tillfälle ges." },
  { id:"sa28", area:"samspel", fraga:"Vad är viktigast i mötet med ett barn som står vid en trottoarkant?", alt:["Att tuta","Att sänka farten och vara beredd på att barnet kan springa ut","Att köra fortare","Att blinka"], ratt:1, forklaring:"Barn kan agera plötsligt och oöverlagt. Sänk farten och var beredd att stanna helt." },
  { id:"sa29", area:"samspel", fraga:"Hur bör du köra i ett bostadsområde med mycket folk i rörelse?", alt:["Som på en landsväg","Lugnt och uppmärksamt med låg fart","Snabbt för att störa mindre","Med helljus"], ratt:1, forklaring:"I bostadsområden rör sig gående, barn och cyklister. Håll låg fart och var beredd på det oväntade." },
  { id:"sa30", area:"samspel", fraga:"Vad signalerar du genom att placera bilen nära mitten inför en korsning?", alt:["Att du ska parkera","Att du avser att svänga vänster","Att du ska backa","Inget"], ratt:1, forklaring:"Placeringen är en del av kommunikationen. Nära mitten visar att du ska svänga vänster; nära högerkanten att du ska svänga höger." },
  { id:"sa31", area:"samspel", fraga:"Hur kan du underlätta för en bil som vill köra in från en påfart på motorväg?", alt:["Öka farten","Om möjligt byta till vänster körfält eller anpassa farten","Bromsa tvärt","Ligga kvar precis bredvid påfarten"], ratt:1, forklaring:"Du kan underlätta inflätningen genom att, när det är säkert, byta till vänster körfält eller justera farten så att luckor skapas." },
  { id:"sa32", area:"samspel", fraga:"Vad bör du göra när du närmar dig en skolbuss som stannat?", alt:["Köra om i full fart","Sänka farten och vara beredd på barn som korsar","Tuta","Köra upp på trottoaren"], ratt:1, forklaring:"Barn kan kliva av och korsa vägen vid en skolbuss. Sänk farten kraftigt och var mycket uppmärksam." },
  { id:"sa33", area:"samspel", fraga:"Hur visar du att du uppfattat en gående som väntar vid ett övergångsställe?", alt:["Genom att gasa förbi","Genom att tydligt sänka farten och vid behov stanna","Genom att tuta","Genom att blinka med helljus"], ratt:1, forklaring:"Genom att tydligt sakta in och stanna visar du att den gående kan korsa. Ögonkontakt bekräftar samspelet." },
  { id:"sa34", area:"samspel", fraga:"Vad är viktigt att komma ihåg om fordons döda vinklar?", alt:["De finns inte på nya bilar","Stora fordon har stora döda vinklar där du blir osynlig för föraren","Bara små bilar har dem","De gäller bara bakåt"], ratt:1, forklaring:"Lastbilar och bussar har stora döda vinklar fram, bak och vid sidorna. Undvik att ligga kvar i dem – ser du inte förarens speglar ser hen inte dig." },
  { id:"sa35", area:"samspel", fraga:"Hur bör du köra förbi en stillastående bil med varningsblinkers på vägrenen?", alt:["Tätt och i hög fart","Sänka farten, hålla avstånd och vara beredd på personer vid bilen","Tuta","Köra som vanligt"], ratt:1, forklaring:"En stillastående bil kan betyda att personer befinner sig på eller nära körbanan. Sänk farten och ge gott om utrymme." },
  { id:"sa36", area:"samspel", fraga:"Vad är grunden för ett gott samspel i trafiken?", alt:["Att alltid ta sin rätt","Att vara uppmärksam, förutsägbar och visa hänsyn","Att köra fortast","Att tuta ofta"], ratt:1, forklaring:"Samspel bygger på att alla är uppmärksamma, kör förutsägbart, kommunicerar tydligt och visar varandra hänsyn." },

  // ===== MILJÖ =====
  { id:"mi1", area:"miljo", fraga:"Vilken gas från bilar bidrar mest till växthuseffekten?", alt:["Syre","Koldioxid (CO₂)","Kväve","Vattenånga"], ratt:1, forklaring:"Koldioxid (CO₂) är den främsta växthusgasen från fordon. Mängden hänger direkt ihop med bränsleförbrukningen." },
  { id:"mi2", area:"miljo", fraga:"Vad gör en katalysator?", alt:["Ökar motoreffekten","Renar avgaserna från skadliga ämnen","Sänker bränsleförbrukningen","Värmer kupén"], ratt:1, forklaring:"Katalysatorn omvandlar en stor del av de skadliga ämnena i avgaserna till mindre farliga ämnen." },
  { id:"mi3", area:"miljo", fraga:"När fungerar katalysatorn sämst?", alt:["När motorn är varm","När motorn är kall, t.ex. vid kallstart","På motorväg","Vid höga varv"], ratt:1, forklaring:"Katalysatorn behöver driftstemperatur för att rena effektivt. Korta resor med kall motor ger därför höga utsläpp." },
  { id:"mi4", area:"miljo", fraga:"Vilka av dessa räknas som förnybara bränslen?", alt:["Bensin och diesel","Etanol och biogas","Endast diesel","Råolja"], ratt:1, forklaring:"Etanol (E85) och biogas är förnybara och ger lägre nettoutsläpp av fossil koldioxid än bensin och diesel." },
  { id:"mi5", area:"miljo", fraga:"Var bör du tvätta bilen?", alt:["På gatan","I en biltvätt eller på en spolplatta","I trädgården","Vid en sjö"], ratt:1, forklaring:"I biltvätt eller på spolplatta renas vattnet. Tvättar du på gatan rinner olja och kemikalier rakt ut i dagvattnet." },
  { id:"mi6", area:"miljo", fraga:"Varför är det olämpligt att tvätta bilen på gatan?", alt:["Det är tillåtet och bra","Smuts, olja och kemikalier rinner orenade ut i naturen via dagvattnet","Det tar för lång tid","Bilen blir inte ren"], ratt:1, forklaring:"Vatten från gatan går ofta orenat ut i sjöar och vattendrag. Föroreningarna skadar miljön." },
  { id:"mi7", area:"miljo", fraga:"Vad minskar bilens miljöpåverkan mest?", alt:["Att köra fortare","Att förbruka mindre bränsle, t.ex. genom sparsam körning","Att tvätta bilen ofta","Att ha helljuset på"], ratt:1, forklaring:"Mindre bränsle innebär mindre utsläpp. Sparsam körning och färre korta resor gör stor skillnad." },
  { id:"mi8", area:"miljo", fraga:"Vilka av dessa är fossila bränslen?", alt:["Bensin och diesel","Biogas och el","Etanol och vätgas","Solenergi"], ratt:0, forklaring:"Bensin och diesel kommer från olja och är fossila. Vid förbränning frigörs koldioxid som varit bunden i miljontals år." },
  { id:"mi9", area:"miljo", fraga:"Vilka skadliga ämnen finns i bilavgaser förutom koldioxid?", alt:["Bara vattenånga","Kväveoxider, kolväten och partiklar","Endast syre","Inga skadliga ämnen"], ratt:1, forklaring:"Avgaser innehåller bland annat kväveoxider, kolväten och partiklar som påverkar både hälsa och miljö." },
  { id:"mi10", area:"miljo", fraga:"Hur hänger bränsleförbrukning och utsläpp ihop?", alt:["De har inget samband","Mer bränsle ger mer koldioxidutsläpp","Mindre bränsle ger mer utsläpp","Bara dieselbilar släpper ut något"], ratt:1, forklaring:"Ju mer bränsle du förbrukar, desto mer koldioxid släpps ut. Att köra snålt minskar alltså utsläppen direkt." },
  { id:"mi11", area:"miljo", fraga:"Vad gör du med spillolja och uttjänta bilbatterier?", alt:["Slänger i soporna","Lämnar till återvinning eller miljöstation","Häller ut dem","Gräver ned dem"], ratt:1, forklaring:"Spillolja och batterier är farligt avfall och ska lämnas till återvinning, aldrig hällas ut eller slängas i hushållssoporna." },
  { id:"mi12", area:"miljo", fraga:"Vad är ett miljövänligt alternativ till korta bilresor?", alt:["Köra ännu kortare med kall motor","Att gå, cykla eller åka kollektivt","Att låta bilen gå på tomgång","Att köra omvägar"], ratt:1, forklaring:"Korta resor med kall motor släpper ut mest per kilometer. Att gå, cykla eller åka kollektivt är både miljövänligt och hälsosamt." },
  { id:"mi13", area:"miljo", fraga:"Vilket av följande är ett förnybart drivmedel?", alt:["Bensin","Diesel","Biogas","Råolja"], ratt:2, forklaring:"Biogas är förnybart och framställs ur biologiskt material. Bensin och diesel är fossila bränslen." },
  { id:"mi14", area:"miljo", fraga:"Vad är den största fördelen med en elbil ur lokalt miljöperspektiv?", alt:["Den låter mer","Den ger inga avgasutsläpp där den körs","Den går alltid fortare","Den behöver aldrig laddas"], ratt:1, forklaring:"En elbil har inga avgasutsläpp lokalt, vilket förbättrar luftkvaliteten i städer. Miljönyttan beror även på hur elen produceras." },
  { id:"mi15", area:"miljo", fraga:"Varför är många korta bilresor extra dåliga för miljön?", alt:["De är alltid på motorväg","Motorn och katalysatorn hinner inte bli varma, vilket ger höga utsläpp","De drar inget bränsle","De är bra för miljön"], ratt:1, forklaring:"Med kall motor och kall katalysator renas avgaserna sämre och förbrukningen per kilometer blir hög. Korta kallstarter är extra smutsiga." },
  { id:"mi16", area:"miljo", fraga:"Vad ska du göra med uttjänta bildäck?", alt:["Slänga i naturen","Lämna till återvinning, t.ex. hos däckverkstad","Bränna dem","Gräva ned dem"], ratt:1, forklaring:"Uttjänta däck lämnas till återvinning. De tas ofta emot där du köper nya däck och materialet återanvänds." },
  { id:"mi17", area:"miljo", fraga:"Hur påverkar tomgångskörning luften i en tätort?", alt:["Renar luften","Bidrar till lokala luftföroreningar i onödan","Påverkar inget","Minskar utsläppen"], ratt:1, forklaring:"Tomgång ger utsläpp utan att du kör någonstans och försämrar luften lokalt. I många kommuner är max 1 minuts tomgång tillåten." },
  { id:"mi18", area:"miljo", fraga:"Vad är ett miljöproblem med partiklar från trafiken?", alt:["De är ofarliga","De kan skada luftvägarna och hälsan","De förbättrar sikten","De gör vägen halare"], ratt:1, forklaring:"Partiklar (bl.a. från avgaser, däck och vägslitage) kan tas upp i luftvägarna och påverka hälsan negativt, särskilt i tätorter." },
  { id:"mi19", area:"miljo", fraga:"Vilket körsätt ger lägst bränsleförbrukning och utsläpp?", alt:["Många hårda accelerationer","Mjuk och jämn körning med god framförhållning","Hög fart hela tiden","Mycket tomgång"], ratt:1, forklaring:"Mjuk, jämn körning utan onödiga inbromsningar och gaspådrag ger lägst förbrukning och därmed lägst utsläpp." },
  { id:"mi20", area:"miljo", fraga:"Vad menas med att ett bränsle är fossilt?", alt:["Det är förnybart","Det kommer från lagrade kol- och oljekällor och ökar koldioxidhalten","Det är gjort av växter som odlas nu","Det är gratis"], ratt:1, forklaring:"Fossila bränslen (bensin, diesel, naturgas) kommer från lagrat organiskt material. Vid förbränning frigörs koldioxid som ökar växthuseffekten." },
  { id:"mi21", area:"miljo", fraga:"Hur kan du minska din klimatpåverkan vid bilköp?", alt:["Välja en bil med hög förbrukning","Välja en bränslesnål eller eldriven bil","Köpa flera bilar","Välja störst möjliga motor"], ratt:1, forklaring:"En bränslesnål eller eldriven bil ger lägre utsläpp. Tänk också på bilens storlek och vikt i förhållande till ditt behov." },
  { id:"mi22", area:"miljo", fraga:"Vad händer med en katalysator om den går sönder eller tas bort?", alt:["Inget","Avgaserna renas inte och utsläppen ökar kraftigt","Bilen går fortare","Bränslet räcker längre"], ratt:1, forklaring:"Utan fungerande katalysator släpps oren avgas ut. Det är både olagligt och mycket sämre för miljön." },
  { id:"mi23", area:"miljo", fraga:"Vad är en miljöfördel med samåkning?", alt:["Fler bilar på vägen","Färre fordon och lägre utsläpp per person","Högre bränsleförbrukning","Mer trafik"], ratt:1, forklaring:"Samåkning innebär att fler delar på en resa, vilket minskar antalet fordon, utsläppen per person och trängseln." },
  { id:"mi24", area:"miljo", fraga:"Var ska spillolja och andra kemikalier från bilen lämnas?", alt:["I avloppet","Till en miljöstation eller återvinningscentral","I naturen","I hushållssoporna"], ratt:1, forklaring:"Spillolja och kemikalier är farligt avfall och ska lämnas till en miljöstation. De får aldrig hällas ut eller slängas i vanliga sopor." },

  // ===== MILJÖVÄNLIG KÖRNING =====
  { id:"sp1", area:"sparsam", fraga:"Hur bör du växla för att köra sparsamt?", alt:["Växla upp sent och köra på höga varv","Växla upp tidigt och köra på låga varv","Aldrig växla","Bara använda lägsta växeln"], ratt:1, forklaring:"Att växla upp tidigt och hålla låga varvtal sänker bränsleförbrukningen utan att försämra framkomligheten." },
  { id:"sp2", area:"sparsam", fraga:"Vad innebär att använda motorbroms?", alt:["Att bromsa hårt med fotbromsen","Att släppa gasen och låta motorn bromsa, ofta med växel ilagd","Att dra i handbromsen","Att stänga av motorn"], ratt:1, forklaring:"Vid motorbroms (gasen släppt med växel i) stryps bränsletillförseln helt – du sparar bränsle och slitage på bromsarna." },
  { id:"sp3", area:"sparsam", fraga:"Vad gäller för tomgångskörning?", alt:["Den är gratis och bra","Den bör undvikas – stäng av motorn vid längre stopp","Den värmer motorn snabbast","Den minskar utsläppen"], ratt:1, forklaring:"Tomgång drar bränsle och förorenar i onödan. I många tätorter är högst 1 minuts tomgång tillåten. Stäng av vid längre stopp." },
  { id:"sp4", area:"sparsam", fraga:"Hur påverkar rätt däcktryck bränsleförbrukningen?", alt:["Det spelar ingen roll","Korrekt däcktryck sänker förbrukningen","För lågt tryck sänker förbrukningen","Högt tryck ökar förbrukningen kraftigt"], ratt:1, forklaring:"För lågt däcktryck ökar rullmotståndet och därmed förbrukningen. Kontrollera trycket regelbundet." },
  { id:"sp5", area:"sparsam", fraga:"Varför bör du ta bort takbox och takräcke när de inte används?", alt:["De är olagliga","De ökar luftmotståndet och därmed bränsleförbrukningen","De gör bilen tystare","De påverkar inget"], ratt:1, forklaring:"Takbox och takräcke ökar luftmotståndet, särskilt vid högre fart, vilket höjer förbrukningen rejält." },
  { id:"sp6", area:"sparsam", fraga:"Hur påverkar högre hastighet bränsleförbrukningen?", alt:["Den minskar","Den ökar, eftersom luftmotståndet växer snabbt med farten","Ingen påverkan","Den halveras"], ratt:1, forklaring:"Luftmotståndet ökar kraftigt med hastigheten. Att sänka farten något ger ofta stor effekt på förbrukningen." },
  { id:"sp7", area:"sparsam", fraga:"Vilken körstil är mest bränslesnål?", alt:["Tvära inbromsningar och snabba gaspådrag","Mjuk och jämn körning med god framförhållning","Hög fart mellan stoppen","Många snabba accelerationer"], ratt:1, forklaring:"Jämn, mjuk körning utan onödiga inbromsningar och accelerationer sparar mest bränsle." },
  { id:"sp8", area:"sparsam", fraga:"Hur påverkar onödig vikt i bilen förbrukningen?", alt:["Den minskar","Den ökar – tyngre bil drar mer bränsle","Ingen påverkan","Bara på motorväg"], ratt:1, forklaring:"Extra vikt kräver mer energi att flytta. Töm bilen på sådant du inte behöver för att spara bränsle." },
  { id:"sp9", area:"sparsam", fraga:"Hur kan god planering av resan spara bränsle?", alt:["Genom att köra omvägar","Genom att undvika köer och onödiga stopp","Genom att köra fortare","Genom att tanka oftare"], ratt:1, forklaring:"En planerad rutt med färre stopp och mindre köstående ger jämnare körning och lägre förbrukning." },
  { id:"sp10", area:"sparsam", fraga:"Ungefär hur mycket kan sparsam körning sänka bränsleförbrukningen?", alt:["1–2 %","10–20 %","50 %","Den påverkar inte förbrukningen"], ratt:1, forklaring:"Med sparsam körteknik kan förbrukningen typiskt sänkas med 10–20 % – bra för både plånbok och miljö." },
  { id:"sp11", area:"sparsam", fraga:"Vad menas med förutseende körning?", alt:["Att köra med blicken nära motorhuven","Att titta långt fram och anpassa farten i god tid","Att köra så fort som möjligt","Att bromsa sent"], ratt:1, forklaring:"Genom att titta långt fram ser du hinder tidigt och kan rulla av farten i stället för att tvärbromsa – mjukare och snålare." },
  { id:"sp12", area:"sparsam", fraga:"Vad är lämpligt vid ett långt stopp, t.ex. vid en järnvägsbom?", alt:["Låta motorn gå på tomgång","Stänga av motorn","Gasa lätt","Köra fram och tillbaka"], ratt:1, forklaring:"Vid längre stopp är det både miljövänligt och bränslesnålt att stänga av motorn i stället för att låta den gå på tomgång." },
  { id:"sp13", area:"sparsam", fraga:"Vid vilket varvtal bör du ungefär växla upp för sparsam körning?", alt:["Så högt varv som möjligt","Vid relativt låga varv (ofta runt 2000–2500 varv/min)","Aldrig växla upp","Först vid maxvarv"], ratt:1, forklaring:"Att växla upp tidigt vid låga varv håller motorn i ett effektivt arbetsområde och sänker förbrukningen." },
  { id:"sp14", area:"sparsam", fraga:"Vad innebär det att 'läsa trafiken' för sparsam körning?", alt:["Att läsa skyltar högt","Att titta långt fram och anpassa farten så att du slipper onödiga stopp","Att läsa karta under körning","Att titta i backspegeln"], ratt:1, forklaring:"Genom god framförhållning kan du rulla mot rödljus och anpassa farten, vilket minskar bromsningar och accelerationer – och förbrukningen." },
  { id:"sp15", area:"sparsam", fraga:"Hur påverkar ett kallt motorstart bränsleförbrukningen?", alt:["Lägre förbrukning","Högre förbrukning tills motorn blivit varm","Ingen påverkan","Motorn drar inget kall"], ratt:1, forklaring:"En kall motor drar mer bränsle och släpper ut mer. Undvik att 'gå på tomgång och värma' – kör i stället mjukt direkt." },
  { id:"sp16", area:"sparsam", fraga:"Vad är bästa sättet att värma en kall motor?", alt:["Lång tomgång på morgonen","Köra iväg direkt och köra mjukt","Rusa motorn på stället","Inte köra alls"], ratt:1, forklaring:"Motorn värms snabbast och mest miljövänligt genom att du kör iväg direkt och kör mjukt – inte genom tomgång." },
  { id:"sp17", area:"sparsam", fraga:"Hur påverkar aggressiv körning med tvära accelerationer förbrukningen?", alt:["Sänker den","Ökar den tydligt","Ingen påverkan","Halverar den"], ratt:1, forklaring:"Snabba accelerationer och inbromsningar drar mycket mer bränsle än ett jämnt körsätt. Mjukt och planerat är snålast." },
  { id:"sp18", area:"sparsam", fraga:"Vad bör du göra med farthållaren för att spara bränsle på en jämn landsväg?", alt:["Aldrig använda den","Använda den för att hålla jämn fart","Bara använda den i stan","Stänga av motorn"], ratt:1, forklaring:"På jämna sträckor hjälper farthållaren dig att hålla en jämn hastighet, vilket ger jämnare och snålare körning." },
  { id:"sp19", area:"sparsam", fraga:"Hur ofta bör du kontrollera däcktrycket för bästa bränsleekonomi?", alt:["Aldrig","Regelbundet, t.ex. ungefär en gång i månaden","Bara en gång om året","Endast vid bilbesiktning"], ratt:1, forklaring:"Kontrollera däcktrycket regelbundet (ca månadsvis). För lågt tryck ökar rullmotståndet och bränsleförbrukningen." },
  { id:"sp20", area:"sparsam", fraga:"Vilken effekt har en takbox vid motorvägsfart?", alt:["Minskar luftmotståndet","Ökar luftmotståndet och därmed förbrukningen","Ingen effekt","Gör bilen snålare"], ratt:1, forklaring:"En takbox ökar luftmotståndet märkbart vid högre fart. Ta av den när den inte används för att spara bränsle." },
  { id:"sp21", area:"sparsam", fraga:"Hur påverkar motorbroms bränsleförbrukningen vid utförskörning?", alt:["Ökar förbrukningen","Bränsletillförseln stryps oftast helt – du sparar bränsle","Ingen påverkan","Du måste gasa samtidigt"], ratt:1, forklaring:"Vid motorbroms (gasen släppt med växel i) stryper moderna motorer bränslet helt, så du rullar nedför nästan utan förbrukning." },

/* ============================================================
   LAGRING (localStorage)
   ============================================================ */
const LS_KEY = "korkort_v1";
function defaultDB(){ return { svar:{}, bokmarken:[], prov:[], installningar:{ tema:null } }; }
let DB = loadDB();
function loadDB(){
  try { const d = JSON.parse(localStorage.getItem(LS_KEY)); if(d && typeof d==="object"){ return Object.assign(defaultDB(), d); } }
  catch(e){}
  return defaultDB();
}
function saveDB(){ try { localStorage.setItem(LS_KEY, JSON.stringify(DB)); } catch(e){} }

function recordAnswer(qid, correct){
  const prev = DB.svar[qid] || { forsok:0 };
  DB.svar[qid] = { ratt: !!correct, forsok: prev.forsok + 1 };
  saveDB();
}
function isBookmarked(qid){ return DB.bokmarken.includes(qid); }
function toggleBookmark(qid){
  const i = DB.bokmarken.indexOf(qid);
  if(i>=0){ DB.bokmarken.splice(i,1); toast("Bokmärke borttaget"); }
  else { DB.bokmarken.push(qid); toast("Fråga bokmärkt ⭐"); }
  saveDB();
}

/* ============================================================
   STATISTIK-HJÄLP
   ============================================================ */
function areaQuestions(areaId){ return QUESTIONS.filter(q => q.area === areaId); }
function areaStats(areaId){
  const qs = areaQuestions(areaId);
  let answered=0, correct=0;
  qs.forEach(q => { const s = DB.svar[q.id]; if(s){ answered++; if(s.ratt) correct++; } });
  return { total: qs.length, answered, correct, pct: qs.length ? Math.round(correct/qs.length*100) : 0 };
}
function overallStats(){
  let answered=0, correct=0;
  QUESTIONS.forEach(q => { const s = DB.svar[q.id]; if(s){ answered++; if(s.ratt) correct++; } });
  const total = QUESTIONS.length;
  return { total, answered, correct, pct: total ? Math.round(correct/total*100) : 0 };
}

/* ============================================================
   SMÅ HJÄLPFUNKTIONER
   ============================================================ */
function shuffle(arr){ const a = arr.slice(); for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function esc(s){ return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
let toastTimer;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove("show"), 1800);
}
function ringSvg(pct, size, stroke, track, fill){
  const r = (size - stroke)/2, c = 2*Math.PI*r, off = c*(1 - pct/100);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" aria-hidden="true">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${track}" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${fill}" stroke-width="${stroke}"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
  </svg>`;
}

function startPractice(mode, areaId){
  let pool = [];
  if(mode === "mixed") pool = shuffle(QUESTIONS.map(q=>q.id));
  else if(mode === "area") pool = shuffle(areaQuestions(areaId).map(q=>q.id));
  else if(mode === "bookmarks") pool = shuffle(DB.bokmarken.slice());
  else if(mode === "weak"){
    const weak = AREAS.filter(a => areaStats(a.id).pct < 80).map(a=>a.id);
    const wanted = weak.length ? weak : AREAS.map(a=>a.id);
    pool = shuffle(QUESTIONS.filter(q => wanted.includes(q.area)).map(q=>q.id));
  }
  if(!pool.length){
    showView("ova");
    toast(mode==="bookmarks" ? "Du har inga bokmärken ännu" : "Inga frågor hittades");

  session = { pool, idx:0, answered:false, correct:0, done:0, mode, areaId };

  renderPracticeQuestion();

function answerPractice(choice){
  const q = qById(session.pool[session.idx]);

  opts.forEach((b,i) => {

  document.getElementById("fb").innerHTML = `

  const last = session.idx >= session.pool.length-1;

const EXAM_COUNT = 65, EXAM_PASS = 52, EXAM_MIN = 50;
let exam = null;
function buildExamPool(){
  // proportionell fördelning över områden, fyll upp till EXAM_COUNT
  let pool = [];
  const perArea = AREAS.map(a => {
    const qs = areaQuestions(a.id);
    return { id:a.id, qs, take: Math.round(qs.length / QUESTIONS.length * EXAM_COUNT) };
  });
  perArea.forEach(p => { pool = pool.concat(shuffle(p.qs.map(q=>q.id)).slice(0, p.take)); });
  // justera till exakt EXAM_COUNT
  const rest = shuffle(QUESTIONS.map(q=>q.id).filter(id => !pool.includes(id)));
  while(pool.length < EXAM_COUNT && rest.length) pool.push(rest.pop());
  pool = shuffle(pool).slice(0, Math.min(EXAM_COUNT, QUESTIONS.length));
  return pool;
}
function renderExamStart(){
  if(exam && exam.running){ renderExamQuestion(); return; }
  const c = document.getElementById("exam-content");

}
function startExam(){
  const pool = buildExamPool();
  exam = { pool, idx:0, answers:{}, remaining: EXAM_MIN*60, running:true, timerId:null };
  exam.timerId = setInterval(tickExam, 1000);
  renderExamQuestion();

function tickExam(){
  if(!exam || !exam.running) return;
  exam.remaining--;
  const t = document.getElementById("timer");
  if(t){ t.textContent = fmtTime(exam.remaining); t.parentElement.classList.toggle("low", exam.remaining <= 300); }
  if(exam.remaining <= 0){ finishExam(true); }
}
function fmtTime(s){ const m = Math.floor(s/60), ss = s%60; return m+":"+String(ss).padStart(2,"0"); }
function renderExamQuestion(){
