<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Körkortskollen – öva inför Trafikverkets teoriprov för B-körkort. Lektioner, vägmärken, övningsfrågor och provläge med tidtagning.">
<meta name="theme-color" content="#2563eb">
<title>Körkortskollen – Teori för B-körkort</title>
<style>
/* ============================================================
   DESIGNTOKENS
   ============================================================ */
:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --primary-soft: #e7effe;
  --accent: #06b6d4;
  --success: #15803d;
  --success-soft: #dcfce7;
  --danger: #dc2626;
  --danger-soft: #fee2e2;
  --warning: #b45309;
  --warning-soft: #fef3c7;

  --bg: #f4f6fb;
  --surface: #ffffff;
  --surface-2: #f8fafc;
  --text: #0f172a;
  --muted: #5b6677;
  --border: #e2e8f0;
  --ring: rgba(37,99,235,.35);
  --shadow: 0 1px 2px rgba(15,23,42,.06), 0 8px 24px rgba(15,23,42,.06);
  --shadow-lg: 0 12px 40px rgba(15,23,42,.14);
  --radius: 16px;
  --radius-sm: 10px;
  --maxw: 1080px;
  --hero-grad: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --primary: #5b8def;
    --primary-dark: #7aa4f5;
    --primary-soft: #1b2a4a;
    --accent: #22d3ee;
    --success: #4ade80;
    --success-soft: #14331f;
    --danger: #f87171;
    --danger-soft: #3a1717;
    --warning: #fbbf24;
    --warning-soft: #3a2d0a;
    --bg: #0b1120;
    --surface: #131c2e;
    --surface-2: #1a2438;
    --text: #e8edf6;
    --muted: #9aa7bd;
    --border: #28324a;
    --ring: rgba(91,141,239,.45);
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
    --shadow-lg: 0 12px 40px rgba(0,0,0,.5);
    --hero-grad: linear-gradient(135deg, #1e40af 0%, #0e7490 100%);
  }
}
:root[data-theme="dark"] {
  --primary: #5b8def;
  --primary-dark: #7aa4f5;
  --primary-soft: #1b2a4a;
  --accent: #22d3ee;
  --success: #4ade80;
  --success-soft: #14331f;
  --danger: #f87171;
  --danger-soft: #3a1717;
  --warning: #fbbf24;
  --warning-soft: #3a2d0a;
  --bg: #0b1120;
  --surface: #131c2e;
  --surface-2: #1a2438;
  --text: #e8edf6;
  --muted: #9aa7bd;
  --border: #28324a;
  --ring: rgba(91,141,239,.45);
  --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.5);
  --hero-grad: linear-gradient(135deg, #1e40af 0%, #0e7490 100%);
}

/* ============================================================
   BAS
   ============================================================ */
* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 17px;
  line-height: 1.6;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}
h1,h2,h3,h4 { line-height: 1.25; margin: 0 0 .4em; color: var(--text); }
h1 { font-size: clamp(1.7rem, 4vw, 2.4rem); }
h2 { font-size: clamp(1.35rem, 3vw, 1.8rem); }
h3 { font-size: 1.2rem; }
p { margin: 0 0 1em; }
a { color: var(--primary); }
ul { margin: 0 0 1em; padding-left: 1.2em; }
li { margin-bottom: .35em; }
img, svg { max-width: 100%; }
:focus-visible { outline: 3px solid var(--ring); outline-offset: 2px; border-radius: 6px; }

.wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 18px; }
.view { display: none; padding: 26px 0 110px; }
.view.active { display: block; animation: fade .25s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(6px);} to {opacity:1; transform:none;} }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
}

/* ============================================================
   TOPPMENY
   ============================================================ */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: color-mix(in srgb, var(--surface) 88%, transparent);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}
.topbar .wrap { display: flex; align-items: center; gap: 14px; height: 62px; }
.brand { display: flex; align-items: center; gap: 9px; font-weight: 800; font-size: 1.15rem; letter-spacing: -.02em; white-space: nowrap; cursor: pointer; background: none; border: 0; color: var(--text); padding: 0; }
.brand .logo { width: 34px; height: 34px; display: grid; place-items: center; background: var(--hero-grad); border-radius: 9px; color: #fff; font-size: 1.1rem; }
.topnav { display: flex; gap: 2px; margin-left: auto; flex-wrap: wrap; }
.topnav button {
  border: 0; background: none; color: var(--muted); font: inherit; font-size: .98rem; font-weight: 600;
  padding: 8px 13px; border-radius: 10px; cursor: pointer; transition: background .15s, color .15s;
}
.topnav button:hover { background: var(--surface-2); color: var(--text); }
.topnav button.active { background: var(--primary-soft); color: var(--primary-dark); }
.theme-btn {
  margin-left: 4px; border: 1px solid var(--border); background: var(--surface); color: var(--text);
  width: 42px; height: 42px; border-radius: 11px; cursor: pointer; font-size: 1.2rem; display: grid; place-items: center;
}
.theme-btn:hover { background: var(--surface-2); }
@media (max-width: 860px) { .topnav { display: none; } }

/* ============================================================
   BOTTENMENY (mobil)
   ============================================================ */
.bottomnav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 60; display: none;
  background: color-mix(in srgb, var(--surface) 94%, transparent);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--border);
  padding: 6px 4px calc(6px + env(safe-area-inset-bottom));
}
.bottomnav .row { display: flex; max-width: 560px; margin: 0 auto; }
.bottomnav button {
  flex: 1; border: 0; background: none; color: var(--muted); font: inherit; font-size: .68rem; font-weight: 600;
  display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 7px 2px; border-radius: 10px; cursor: pointer; min-height: 52px;
}
.bottomnav button .ic { font-size: 1.3rem; line-height: 1; }
.bottomnav button.active { color: var(--primary); }
@media (max-width: 860px) { .bottomnav { display: block; } }

/* ============================================================
   KNAPPAR
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font: inherit; font-weight: 700; cursor: pointer; border: 1px solid transparent;
  padding: 12px 20px; border-radius: 12px; min-height: 48px; text-decoration: none;
  transition: transform .08s, background .15s, box-shadow .15s; user-select: none;
}
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--primary); color: #fff; box-shadow: 0 6px 16px var(--ring); }
.btn-primary:hover { background: var(--primary-dark); }
.btn-ghost { background: var(--surface); color: var(--text); border-color: var(--border); }
.btn-ghost:hover { background: var(--surface-2); }
.btn-soft { background: var(--primary-soft); color: var(--primary-dark); }
.btn-soft:hover { filter: brightness(.97); }
.btn-danger { background: var(--danger-soft); color: var(--danger); border-color: transparent; }
.btn-block { width: 100%; }
.btn-lg { padding: 15px 26px; font-size: 1.06rem; min-height: 56px; }
.btn-sm { padding: 8px 14px; min-height: 40px; font-size: .92rem; border-radius: 10px; }
.btn[disabled] { opacity: .5; cursor: not-allowed; }

/* ============================================================
   KORT & LAYOUT
   ============================================================ */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px; }
.grid { display: grid; gap: 16px; }
.grid-areas { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
.section-head { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; }
.muted { color: var(--muted); }
.lead { font-size: 1.1rem; color: var(--muted); max-width: 60ch; }
.chip { display: inline-flex; align-items: center; gap: 6px; font-size: .8rem; font-weight: 700; padding: 4px 11px; border-radius: 999px; background: var(--surface-2); color: var(--muted); border: 1px solid var(--border); }
.chip.area { background: var(--primary-soft); color: var(--primary-dark); border-color: transparent; }
.back-link { display: inline-flex; align-items: center; gap: 6px; background: none; border: 0; color: var(--primary); font: inherit; font-weight: 700; cursor: pointer; padding: 6px 0; margin-bottom: 6px; }

/* ============================================================
   HERO / STARTSIDA
   ============================================================ */
.hero { background: var(--hero-grad); color: #fff; border-radius: 22px; padding: 30px; display: flex; gap: 26px; align-items: center; flex-wrap: wrap; box-shadow: var(--shadow-lg); }
.hero h1 { color: #fff; margin-bottom: .25em; }
.hero p { color: rgba(255,255,255,.92); margin-bottom: 1.1em; max-width: 46ch; }
.hero .cta { display: flex; gap: 12px; flex-wrap: wrap; }
.hero .btn-primary { background: #fff; color: var(--primary-dark); box-shadow: 0 8px 20px rgba(0,0,0,.18); }
.hero .btn-ghost { background: rgba(255,255,255,.14); color: #fff; border-color: rgba(255,255,255,.45); }
.hero-info { flex: 1 1 320px; }
.hero-ring { flex: 0 0 auto; display: grid; place-items: center; }
.ring { position: relative; width: 168px; height: 168px; }
.ring svg { transform: rotate(-90deg); }
.ring .ring-label { position: absolute; inset: 0; display: grid; place-content: center; text-align: center; }
.ring .ring-num { font-size: 2.4rem; font-weight: 800; line-height: 1; }
.ring .ring-sub { font-size: .82rem; opacity: .9; }

.stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 12px; margin: 18px 0 6px; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; }
.stat .n { font-size: 1.7rem; font-weight: 800; }
.stat .l { font-size: .85rem; color: var(--muted); }

/* OMRÅDESKORT */
.area-card { text-align: left; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px; cursor: pointer; display: flex; flex-direction: column; gap: 10px; transition: transform .1s, box-shadow .15s, border-color .15s; }
.area-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: color-mix(in srgb, var(--primary) 40%, var(--border)); }
.area-ic { width: 50px; height: 50px; border-radius: 13px; display: grid; place-items: center; font-size: 1.6rem; color: #fff; }
.area-card h3 { margin: 0; }
.area-card .desc { font-size: .92rem; color: var(--muted); margin: 0; flex: 1; }
.bar { height: 9px; background: var(--surface-2); border-radius: 999px; overflow: hidden; border: 1px solid var(--border); }
.bar > span { display: block; height: 100%; background: var(--primary); border-radius: 999px; transition: width .5s ease; }
.bar.ok > span { background: var(--success); }
.barline { display: flex; align-items: center; justify-content: space-between; font-size: .82rem; color: var(--muted); margin-bottom: 5px; }

/* ============================================================
   LEKTIONER
   ============================================================ */
.lesson { border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow); margin-bottom: 16px; overflow: hidden; }
.lesson-head { display: flex; gap: 16px; align-items: center; padding: 18px 20px; }
.lesson-illu { flex: 0 0 auto; width: 84px; height: 84px; border-radius: 14px; background: var(--surface-2); display: grid; place-items: center; border: 1px solid var(--border); }
.lesson-illu svg { width: 60px; height: 60px; }
.lesson-body { padding: 0 20px 20px; }
.lesson-body h4 { margin-top: 1.1em; color: var(--primary-dark); }
.callout { background: var(--primary-soft); border-left: 4px solid var(--primary); padding: 12px 16px; border-radius: 10px; margin: 14px 0; }
.callout.warn { background: var(--warning-soft); border-left-color: var(--warning); }
.factgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px; margin: 14px 0; }
.factgrid .f { background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
.factgrid .f b { display: block; font-size: 1.35rem; color: var(--primary-dark); }
.factgrid .f span { font-size: .85rem; color: var(--muted); }

/* ============================================================
   VÄGMÄRKEN
   ============================================================ */
.sign-cat { margin-bottom: 26px; }
.sign-cat h3 { display: flex; align-items: center; gap: 8px; }
.sign-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 14px; }
.sign-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px 12px; text-align: center; box-shadow: var(--shadow); }
.sign-card .svgbox { height: 96px; display: grid; place-items: center; }
.sign-card .svgbox svg { width: 86px; height: 86px; }
.sign-card .nm { font-weight: 700; font-size: .92rem; margin-top: 8px; }
.sign-card .ds { font-size: .8rem; color: var(--muted); margin-top: 3px; }

/* ============================================================
   FRÅGOR / ÖVNING
   ============================================================ */
.q-card { max-width: 760px; margin: 0 auto; }
.q-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
.q-progress { flex: 1; }
.q-progress .bar { height: 8px; }
.q-count { font-size: .85rem; color: var(--muted); white-space: nowrap; font-weight: 600; }
.bookmark-btn { border: 1px solid var(--border); background: var(--surface); width: 46px; height: 46px; border-radius: 12px; cursor: pointer; font-size: 1.35rem; display: grid; place-items: center; color: var(--muted); }
.bookmark-btn.on { color: #f59e0b; border-color: #f59e0b; background: var(--warning-soft); }
.q-sign { display: grid; place-items: center; margin: 4px 0 18px; }
.q-sign svg { width: 130px; height: 130px; }
.q-text { font-size: 1.3rem; font-weight: 700; margin: 4px 0 20px; line-height: 1.35; }
.options { display: grid; gap: 12px; }
.opt {
  display: flex; align-items: center; gap: 14px; text-align: left; width: 100%;
  background: var(--surface); border: 2px solid var(--border); border-radius: 14px;
  padding: 15px 17px; font: inherit; font-size: 1.05rem; cursor: pointer; color: var(--text);
  transition: border-color .12s, background .12s;
}
.opt:hover:not([disabled]) { border-color: var(--primary); background: var(--primary-soft); }
.opt .key { flex: 0 0 auto; width: 32px; height: 32px; border-radius: 9px; background: var(--surface-2); display: grid; place-items: center; font-weight: 800; color: var(--muted); border: 1px solid var(--border); }
.opt.correct { border-color: var(--success); background: var(--success-soft); }
.opt.correct .key { background: var(--success); color: #fff; border-color: var(--success); }
.opt.wrong { border-color: var(--danger); background: var(--danger-soft); }
.opt.wrong .key { background: var(--danger); color: #fff; border-color: var(--danger); }
.opt.chosen { border-color: var(--primary); background: var(--primary-soft); }
.opt[disabled] { cursor: default; }
.feedback { margin-top: 18px; border-radius: 14px; padding: 16px 18px; border: 1px solid var(--border); animation: fade .2s ease; }
.feedback.ok { background: var(--success-soft); border-color: var(--success); }
.feedback.no { background: var(--danger-soft); border-color: var(--danger); }
.feedback .ft { font-weight: 800; display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.feedback.ok .ft { color: var(--success); }
.feedback.no .ft { color: var(--danger); }
.q-actions { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
.q-actions .btn { flex: 1; min-width: 140px; }

/* PRAKTIK-MENY */
.mode-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 14px; }

/* ============================================================
   PROVLÄGE
   ============================================================ */
.exam-bar { position: sticky; top: 62px; z-index: 30; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); padding: 12px 16px; display: flex; align-items: center; gap: 14px; margin-bottom: 18px; flex-wrap: wrap; }
.timer { font-variant-numeric: tabular-nums; font-weight: 800; font-size: 1.3rem; display: flex; align-items: center; gap: 8px; }
.timer.low { color: var(--danger); }
.exam-bar .grow { flex: 1; }
.navigator { display: grid; grid-template-columns: repeat(auto-fill, minmax(38px,1fr)); gap: 7px; margin-top: 10px; }
.navigator button { aspect-ratio: 1; border: 1px solid var(--border); background: var(--surface); border-radius: 9px; font: inherit; font-weight: 700; font-size: .85rem; cursor: pointer; color: var(--muted); min-height: 0; }
.navigator button.answered { background: var(--primary-soft); color: var(--primary-dark); border-color: transparent; }
.navigator button.current { outline: 3px solid var(--ring); }

.result-banner { border-radius: 20px; padding: 30px; text-align: center; color: #fff; margin-bottom: 22px; box-shadow: var(--shadow-lg); }
.result-banner.pass { background: linear-gradient(135deg,#16a34a,#15803d); }
.result-banner.fail { background: linear-gradient(135deg,#ef4444,#b91c1c); }
.result-banner .big { font-size: 3.2rem; font-weight: 800; line-height: 1; margin: 6px 0; }
.result-banner h2 { color: #fff; }

table.tbl { width: 100%; border-collapse: collapse; }
table.tbl th, table.tbl td { text-align: left; padding: 11px 10px; border-bottom: 1px solid var(--border); }
table.tbl th { font-size: .82rem; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
table.tbl td .bar { width: 130px; display: inline-block; vertical-align: middle; }

.empty { text-align: center; color: var(--muted); padding: 50px 20px; }
.empty .big-ic { font-size: 3rem; display: block; margin-bottom: 10px; }

.review-item { border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; background: var(--surface); }
.review-item.r-ok { border-left: 5px solid var(--success); }
.review-item.r-no { border-left: 5px solid var(--danger); }

/* ============================================================
   TOAST
   ============================================================ */
#toast { position: fixed; left: 50%; bottom: 90px; transform: translateX(-50%) translateY(20px); background: var(--text); color: var(--bg); padding: 12px 20px; border-radius: 999px; font-weight: 700; box-shadow: var(--shadow-lg); opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 200; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <button class="brand" data-nav="hem" aria-label="Till startsidan">
      <span class="logo" aria-hidden="true">🚗</span> Körkortskollen
    </button>
    <nav class="topnav" aria-label="Huvudmeny">
      <button data-nav="hem">Hem</button>
      <button data-nav="lektioner">Lektioner</button>
      <button data-nav="vagmarken">Vägmärken</button>
      <button data-nav="ova">Öva</button>
      <button data-nav="prov">Provläge</button>
      <button data-nav="bokmarken">Bokmärken</button>
      <button data-nav="statistik">Statistik</button>
    </nav>
    <button class="theme-btn" id="themeBtn" aria-label="Byt mellan ljust och mörkt läge" title="Ljust/mörkt läge">🌙</button>
  </div>
</header>

<main class="wrap">
  <section id="view-hem" class="view" aria-label="Startsida"><div id="home-content"></div></section>
  <section id="view-lektioner" class="view" aria-label="Lektioner"><div id="lessons-content"></div></section>
  <section id="view-vagmarken" class="view" aria-label="Vägmärken"><div id="signs-content"></div></section>
  <section id="view-ova" class="view" aria-label="Övning"><div id="practice-content"></div></section>
  <section id="view-prov" class="view" aria-label="Provläge"><div id="exam-content"></div></section>
  <section id="view-bokmarken" class="view" aria-label="Bokmärken"><div id="bookmarks-content"></div></section>
  <section id="view-statistik" class="view" aria-label="Statistik"><div id="stats-content"></div></section>
</main>

<nav class="bottomnav" aria-label="Mobilmeny">
  <div class="row">
    <button data-nav="hem"><span class="ic" aria-hidden="true">🏠</span>Hem</button>
    <button data-nav="lektioner"><span class="ic" aria-hidden="true">📖</span>Lektioner</button>
    <button data-nav="ova"><span class="ic" aria-hidden="true">✏️</span>Öva</button>
    <button data-nav="prov"><span class="ic" aria-hidden="true">⏱️</span>Prov</button>
    <button data-nav="statistik"><span class="ic" aria-hidden="true">📊</span>Statistik</button>
  </div>
</nav>

<div id="toast" role="status" aria-live="polite"></div>

<script>
"use strict";
/* ============================================================
   DATA: OMRÅDEN
   ============================================================ */
const AREAS = [
  { id:"trafikregler",  namn:"Trafikregler",        farg:"#2563eb", ikon:"🚦", beskrivning:"Hastigheter, väjningsplikt, omkörning, parkering och korsningar." },
  { id:"vagmarken",     namn:"Vägmärken",           farg:"#dc2626", ikon:"⛔", beskrivning:"Känn igen varnings-, förbuds-, påbuds- och anvisningsmärken." },

  // ===== FORDONSKÄNNEDOM =====

  // ===== VÄGLAG & VÄDER =====

const qById = id => QUESTIONS.find(q => q.id === id);

/* ============================================================
   LAGRING (localStorage)
   ============================================================ */
const LS_KEY = "korkort_v1";
function defaultDB(){ return { svar:{}, bokmarken:[], prov:[], installningar:{ tema:null } }; }
let DB = loadDB();
function loadDB(){
  try { const d = JSON.parse(localStorage.getItem(LS_KEY)); if(d && typeof d==="object"){ return Object.assign(defaultDB(), d); } }
  catch(e){}
  return defaultDB();
}
function saveDB(){ try { localStorage.setItem(LS_KEY, JSON.stringify(DB)); } catch(e){} }

function recordAnswer(qid, correct){
  const prev = DB.svar[qid] || { forsok:0 };
  DB.svar[qid] = { ratt: !!correct, forsok: prev.forsok + 1 };
  saveDB();
}
function isBookmarked(qid){ return DB.bokmarken.includes(qid); }
function toggleBookmark(qid){
  const i = DB.bokmarken.indexOf(qid);
  if(i>=0){ DB.bokmarken.splice(i,1); toast("Bokmärke borttaget"); }
  else { DB.bokmarken.push(qid); toast("Fråga bokmärkt ⭐"); }
  saveDB();
}

/* ============================================================
   STATISTIK-HJÄLP
   ============================================================ */
function areaQuestions(areaId){ return QUESTIONS.filter(q => q.area === areaId); }
function areaStats(areaId){
  const qs = areaQuestions(areaId);
  let answered=0, correct=0;
  qs.forEach(q => { const s = DB.svar[q.id]; if(s){ answered++; if(s.ratt) correct++; } });
  return { total: qs.length, answered, correct, pct: qs.length ? Math.round(correct/qs.length*100) : 0 };
}
function overallStats(){
  let answered=0, correct=0;
  QUESTIONS.forEach(q => { const s = DB.svar[q.id]; if(s){ answered++; if(s.ratt) correct++; } });
  const total = QUESTIONS.length;
  return { total, answered, correct, pct: total ? Math.round(correct/total*100) : 0 };
}

/* ============================================================
   SMÅ HJÄLPFUNKTIONER
   ============================================================ */
function shuffle(arr){ const a = arr.slice(); for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function esc(s){ return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
let toastTimer;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove("show"), 1800);
}
function ringSvg(pct, size, stroke, track, fill){
  const r = (size - stroke)/2, c = 2*Math.PI*r, off = c*(1 - pct/100);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" aria-hidden="true">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${track}" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${fill}" stroke-width="${stroke}"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
  </svg>`;
}

function startPractice(mode, areaId){
  let pool = [];

  else if(mode === "bookmarks") pool = shuffle(DB.bokmarken.slice());

const EXAM_COUNT = 65, EXAM_PASS = 52, EXAM_MIN = 50;
let exam = null;
function buildExamPool(){
  // proportionell fördelning över områden, fyll upp till EXAM_COUNT
  let pool = [];
  const perArea = AREAS.map(a => {
    const qs = areaQuestions(a.id);
    return { id:a.id, qs, take: Math.round(qs.length / QUESTIONS.length * EXAM_COUNT) };
  });
  perArea.forEach(p => { pool = pool.concat(shuffle(p.qs.map(q=>q.id)).slice(0, p.take)); });
  // justera till exakt EXAM_COUNT
  const rest = shuffle(QUESTIONS.map(q=>q.id).filter(id => !pool.includes(id)));
  while(pool.length < EXAM_COUNT && rest.length) pool.push(rest.pop());
  pool = shuffle(pool).slice(0, Math.min(EXAM_COUNT, QUESTIONS.length));
  return pool;
}
function renderExamStart(){
  if(exam && exam.running){ renderExamQuestion(); return; }
  const c = document.getElementById("exam-content");
  const last = DB.prov[DB.prov.length-1];

        <div class="f"><b>${EXAM_MIN} min</b><span>tidsgräns</span></div>
      </div>
      <ul>
        <li>Du får <b>ingen</b> facit förrän provet är inlämnat.</li>
        <li>Du kan hoppa fram och tillbaka mellan frågorna.</li>
        <li>Provet rättas automatiskt och sparas i din statistik.</li>
      </ul>

      ${last ? `<p class="muted" style="text-align:center;margin:14px 0 0">Senaste prov: <b>${last.antalRatt}/${last.total}</b> – ${last.godkand?'Godkänt ✓':'Underkänt'}</p>` : ""}
    </div>`;
}
function startExam(){
  const pool = buildExamPool();
  exam = { pool, idx:0, answers:{}, remaining: EXAM_MIN*60, running:true, timerId:null };
  exam.timerId = setInterval(tickExam, 1000);
  renderExamQuestion();
}
function tickExam(){
  if(!exam || !exam.running) return;
  exam.remaining--;
  const t = document.getElementById("timer");
  if(t){ t.textContent = fmtTime(exam.remaining); t.parentElement.classList.toggle("low", exam.remaining <= 300); }
  if(exam.remaining <= 0){ finishExam(true); }
}
function fmtTime(s){ const m = Math.floor(s/60), ss = s%60; return m+":"+String(ss).padStart(2,"0"); }
function renderExamQuestion(){
  const c = document.getElementById("exam-content");
  const q = qById(exam.pool[exam.idx]);
  const answeredCount = Object.keys(exam.answers).length;
  c.innerHTML = `
    <div class="exam-bar">
      <div class="timer ${exam.remaining<=300?'low':''}">⏱️ <span id="timer">${fmtTime(exam.remaining)}</span></div>
      <div class="grow muted" style="text-align:center">Besvarade: <b>${answeredCount}/${exam.pool.length}</b></div>
      <button class="btn btn-primary btn-sm" onclick="confirmFinish()">Lämna in</button>
    </div>
    <div class="q-card">
      <div class="q-top">
        <div class="q-count">Fråga ${exam.idx+1} av ${exam.pool.length}</div>
      </div>
      ${q.signId && signById(q.signId) ? `<div class="q-sign" role="img" aria-label="Vägmärke">${signById(q.signId).svg}</div>` : ""}
      <div class="q-text">${esc(q.fraga)}</div>
      <div class="options" id="opts"></div>
      <div class="q-actions">
        <button class="btn btn-ghost" id="prev" ${exam.idx===0?'disabled':''}>← Föregående</button>
        <button class="btn btn-primary" id="next">${exam.idx===exam.pool.length-1?'Till sista':'Nästa →'}</button>
      </div>
      <h4 style="margin-top:26px">Snabbnavigering</h4>
      <div class="navigator" id="nav"></div>
    </div>`;
  const opts = c.querySelector("#opts");
  q.alt.forEach((text,i) => {
    const chosen = exam.answers[q.id] === i;
    const b = el(`<button class="opt ${chosen?'chosen':''}"><span class="key">${"ABCD"[i]}</span><span>${esc(text)}</span></button>`);
    b.addEventListener("click", () => {
      exam.answers[q.id] = i;
      if(exam.idx < exam.pool.length-1){ exam.idx++; renderExamQuestion(); }
      else renderExamQuestion();
    });
    opts.appendChild(b);
  });
  c.querySelector("#prev").addEventListener("click", () => { if(exam.idx>0){ exam.idx--; renderExamQuestion(); } });
  c.querySelector("#next").addEventListener("click", () => { if(exam.idx<exam.pool.length-1){ exam.idx++; renderExamQuestion(); } });
  const nav = c.querySelector("#nav");
  exam.pool.forEach((id,i) => {
    const b = el(`<button class="${exam.answers[id]!==undefined?'answered':''} ${i===exam.idx?'current':''}">${i+1}</button>`);
    b.addEventListener("click", () => { exam.idx=i; renderExamQuestion(); });
    nav.appendChild(b);
  });
}
function confirmFinish(){
  const left = exam.pool.length - Object.keys(exam.answers).length;
  if(left > 0 && !confirm(`Du har ${left} obesvarad${left===1?'':'e'} fråg${left===1?'a':'or'}. Vill du lämna in ändå?`)) return;
  finishExam(false);
}
function finishExam(timeUp){
  clearInterval(exam.timerId); exam.running = false;
  let correct = 0;
  const perArea = {};
  AREAS.forEach(a => perArea[a.id] = { r:0, t:0 });
  exam.pool.forEach(id => {
    const q = qById(id);
    perArea[q.area].t++;
    if(exam.answers[id] === q.ratt){ correct++; perArea[q.area].r++; }
  });
  const passed = correct >= EXAM_PASS;
  const rec = { datum: Date.now(), antalRatt: correct, total: exam.pool.length, godkand: passed, perOmrade: perArea, tidUte: timeUp };
  DB.prov.push(rec);
  // logga svaren även i statistiken
  exam.pool.forEach(id => { if(exam.answers[id]!==undefined) recordAnswer(id, exam.answers[id]===qById(id).ratt); });
  saveDB();
  renderExamResult(rec, timeUp);
}
function renderExamResult(rec, timeUp){

  const passed = rec.godkand;
  c.innerHTML = `

    </div>

    </div>

      <button class="btn btn-primary btn-lg" onclick="startExam()">🔁 Gör ett nytt prov</button>
      <button class="btn btn-ghost btn-lg" onclick="showExamReview()">🔎 Gå igenom svaren</button>
    </div>
    <div id="reviewArea"></div>`;
  const body = c.querySelector("#paBody");
  AREAS.forEach(a => {
    const p = rec.perOmrade[a.id]; if(!p || !p.t) return;
    const pct = Math.round(p.r/p.t*100);
    body.appendChild(el(`<tr>
      <td>${a.ikon} ${esc(a.namn)}</td>

    </tr>`));
  });
}
function showExamReview(){
  const wrap = document.getElementById("reviewArea");
  wrap.innerHTML = `<h3>Genomgång av frågorna</h3>`;
  exam.pool.forEach((id,i) => {
    const q = qById(id);
    const chosen = exam.answers[id];
    const ok = chosen === q.ratt;
    wrap.appendChild(el(`
      <div class="review-item ${ok?'r-ok':'r-no'}">
        <div style="display:flex;justify-content:space-between;gap:10px">
          <b>Fråga ${i+1}</b><span class="chip area">${esc(areaById(q.area).namn)}</span>
        </div>
        ${q.signId && signById(q.signId) ? `<div class="q-sign" style="margin:8px 0">${signById(q.signId).svg}</div>` : ""}
        <p style="font-weight:700;margin:8px 0">${esc(q.fraga)}</p>
        <p style="margin:4px 0">Ditt svar: <b style="color:${ok?'var(--success)':'var(--danger)'}">${chosen!==undefined?esc(q.alt[chosen]):'(inget svar)'}</b></p>
        ${ok?'':`<p style="margin:4px 0">Rätt svar: <b style="color:var(--success)">${esc(q.alt[q.ratt])}</b></p>`}
        <div class="feedback ${ok?'ok':'no'}" style="margin-top:10px">${esc(q.forklaring)}</div>
      </div>`));
  });
  wrap.scrollIntoView({ behavior:"smooth", block:"start" });
}

/* ============================================================
   BOKMÄRKEN
   ============================================================ */
function renderBookmarks(){
  const c = document.getElementById("bookmarks-content");
  const ids = DB.bokmarken.filter(id => qById(id));
  if(!ids.length){
    c.innerHTML = `<div class="section-head"><h1>Bokmärken</h1></div>
      <div class="empty"><span class="big-ic">⭐</span>Du har inga bokmärkta frågor ännu.<br>Tryck på stjärnan vid en fråga när du övar för att spara den här.</div>`;
    return;
  }
  c.innerHTML = `
    <div class="section-head">
      <h1>Bokmärken</h1>
      <button class="btn btn-primary" onclick="startPractice('bookmarks')">✏️ Öva bokmärken</button>
    </div>
    <p class="muted">${ids.length} sparade fråg${ids.length===1?'a':'or'}. Tryck för att visa svaret.</p>
    <div id="bmList"></div>`;
  const list = c.querySelector("#bmList");
  ids.forEach(id => {
    const q = qById(id);
    const item = el(`
      <div class="review-item">
        <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start">
          <span class="chip area">${esc(areaById(q.area).namn)}</span>
          <button class="btn btn-sm btn-danger" data-rm>Ta bort ⭐</button>
        </div>
        ${q.signId && signById(q.signId) ? `<div class="q-sign" style="margin:8px 0">${signById(q.signId).svg}</div>` : ""}
        <p style="font-weight:700;margin:8px 0 0">${esc(q.fraga)}</p>
        <button class="btn btn-ghost btn-sm" data-show style="margin-top:10px">Visa svar</button>
        <div data-ans style="display:none">
          <div class="feedback ok" style="margin-top:10px"><b>Rätt svar:</b> ${esc(q.alt[q.ratt])}<br>${esc(q.forklaring)}</div>
        </div>
      </div>`);
    item.querySelector("[data-show]").addEventListener("click", e => {
      const a = item.querySelector("[data-ans]");
      const open = a.style.display === "block";
      a.style.display = open ? "none" : "block";
      e.currentTarget.textContent = open ? "Visa svar" : "Dölj svar";
    });
    item.querySelector("[data-rm]").addEventListener("click", () => { toggleBookmark(id); renderBookmarks(); });
    list.appendChild(item);
  });
}

/* ============================================================
   STATISTIK
   ============================================================ */
function renderStats(){
  const c = document.getElementById("stats-content");
  const o = overallStats();
  c.innerHTML = `
    <div class="section-head"><h1>Din statistik</h1></div>
    <div class="card" style="display:flex;gap:24px;align-items:center;flex-wrap:wrap;margin-bottom:18px">
      <div class="ring" style="color:var(--primary)">
        ${ringSvg(o.pct,150,13,"var(--surface-2)","var(--primary)")}
        <div class="ring-label"><span class="ring-num" style="font-size:1.9rem">${o.pct}%</span><span class="ring-sub muted">rätt</span></div>
      </div>
      <div style="flex:1;min-width:200px">
        <h3 style="margin-top:0">Helhet</h3>
        <p class="muted" style="margin:0">Du har besvarat <b>${o.answered}</b> av <b>${o.total}</b> frågor och svarat rätt på <b>${o.correct}</b> av dem.</p>
        <div class="bar" style="margin-top:12px"><span style="width:${o.total?Math.round(o.answered/o.total*100):0}%"></span></div>
        <div class="barline" style="margin-top:5px"><span>Genomgånget</span><span>${o.total?Math.round(o.answered/o.total*100):0}%</span></div>
      </div>
    </div>

    <div class="card" style="margin-bottom:18px">
      <h3 style="margin-top:0">Per område</h3>
      <table class="tbl"><thead><tr><th>Område</th><th>Rätt</th><th>Behärskning</th></tr></thead><tbody id="saBody"></tbody></table>
    </div>

    <div class="card" style="margin-bottom:18px">
      <h3 style="margin-top:0">Provhistorik</h3>
      <div id="provList"></div>
    </div>

    <div class="card">
      <h3 style="margin-top:0">Inställningar</h3>
      <p class="muted">All data sparas lokalt i din webbläsare.</p>
      <div style="display:flex;flex-wrap:wrap;gap:10px">
        <button class="btn btn-ghost" onclick="resetQuestions()">🔄 Börja om med alla frågorna</button>
        <button class="btn btn-danger" onclick="resetAll()">🗑️ Nollställ allt (även bokmärken & prov)</button>
      </div>
      <p class="muted" style="font-size:.85rem;margin:12px 0 0">"Börja om med alla frågorna" nollställer din övningsprogress så att du kan köra alla frågor från början – bokmärken och provhistorik behålls.</p>
    </div>`;
  const sa = c.querySelector("#saBody");
  AREAS.forEach(a => {
    const s = areaStats(a.id);
    sa.appendChild(el(`<tr>
      <td>${a.ikon} ${esc(a.namn)}</td>
      <td style="white-space:nowrap">${s.correct}/${s.total}</td>
      <td><div class="bar ${s.pct>=80?'ok':''}"><span style="width:${s.pct}%"></span></div></td>
    </tr>`));
  });
  const pl = c.querySelector("#provList");
  if(!DB.prov.length){ pl.innerHTML = `<p class="muted">Du har inte gjort något prov ännu.</p>`; }
  else {
    DB.prov.slice().reverse().forEach(p => {
      const d = new Date(p.datum);
      pl.appendChild(el(`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
        <span>${d.toLocaleDateString("sv-SE")} ${d.toLocaleTimeString("sv-SE",{hour:'2-digit',minute:'2-digit'})}</span>
        <span><b>${p.antalRatt}/${p.total}</b> <span class="chip" style="background:${p.godkand?'var(--success-soft)':'var(--danger-soft)'};color:${p.godkand?'var(--success)':'var(--danger)'};border:0">${p.godkand?'Godkänt':'Underkänt'}</span></span>
      </div>`));
    });
  }
}
function resetQuestions(){
  if(!confirm("Vill du börja om med alla frågorna? All din övningsprogress och områdesbehärskning nollställs, men bokmärken och provhistorik behålls. Detta går inte att ångra.")) return;
  DB.svar = {}; saveDB(); toast("Du börjar om från början 🔄"); renderStats();
}
function resetAll(){
  if(!confirm("Vill du nollställa all din framgång, bokmärken och provhistorik? Detta går inte att ångra.")) return;
  DB = defaultDB(); saveDB(); toast("All data nollställd"); applyTheme(); renderStats();
}

/* ============================================================
   TEMA
   ============================================================ */
function applyTheme(){
  const t = DB.installningar.tema;
  if(t) document.documentElement.setAttribute("data-theme", t);
  else document.documentElement.removeAttribute("data-theme");
  updateThemeBtn();
}
function updateThemeBtn(){
  const dark = isDark();
  const b = document.getElementById("themeBtn");
  if(b) b.textContent = dark ? "☀️" : "🌙";
}
function isDark(){
  const t = DB.installningar.tema;
  if(t) return t === "dark";
  return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
}
function toggleTheme(){
  DB.installningar.tema = isDark() ? "light" : "dark";
  saveDB(); applyTheme();
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
  applyTheme();
  document.querySelectorAll("[data-nav]").forEach(b => b.addEventListener("click", () => showView(b.dataset.nav)));
  document.getElementById("themeBtn").addEventListener("click", toggleTheme);
  window.addEventListener("hashchange", () => showView(location.hash.slice(1) || "hem"));
  showView(location.hash.slice(1) || "hem");
}
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
